name: Build Images

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build images (controller, core, gateway)
        env:
          SOURCE_URL: https://github.com/${{ github.repository }}
        run: |
          docker buildx build \
            --load -t hiversh/controller:latest \
            -f docker/controller.Dockerfile \
            --label org.opencontainers.image.source=$SOURCE_URL \
            --cache-from type=gha,scope=controller \
            --cache-to   type=gha,mode=max,scope=controller \
            .
          docker buildx build \
            --load -t hiversh/core:latest \
            -f docker/core.Dockerfile \
            --label org.opencontainers.image.source=$SOURCE_URL \
            --cache-from type=gha,scope=core \
            --cache-to   type=gha,mode=max,scope=core \
            .
          docker buildx build \
            --load -t hiversh/gateway:latest \
            --label org.opencontainers.image.source=$SOURCE_URL \
            --cache-from type=gha,scope=gateway \
            --cache-to   type=gha,mode=max,scope=gateway \
            docker/gateway

      - name: Save images as artifact
        run: |
          docker save \
            hiversh/controller:latest \
            hiversh/core:latest \
            hiversh/gateway:latest \
            -o images.tar

      - uses: actions/upload-artifact@v4
        with:
          name: hiver-images
          path: images.tar
          retention-days: 1
