name: Publish Hiver

on:
  workflow_run:
    workflows: ["Unit tests"]
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          CURRENT=$(jq -r .version cli/package.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            PREVIOUS=$(git show HEAD^:cli/package.json 2>/dev/null | jq -r .version || echo "")
            if [ "$CURRENT" != "$PREVIOUS" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Assert client version matches CLI
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          CLIENT_VERSION=$(jq -r .version client/typescript/package.json)
          if [ "$CLIENT_VERSION" != "$VERSION" ]; then
            echo "Error: @hiver.sh/client version ($CLIENT_VERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi
          PYTHON_VERSION=$(grep '^version = ' client/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYTHON_VERSION" != "$VERSION" ]; then
            echo "Error: hiver-py version ($PYTHON_VERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi

      - uses: actions/setup-node@v6
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Build and publish typescript client
        if: steps.version.outputs.changed == 'true'
        run: |
          npm ci
          npm run build
          npm publish --provenance
        working-directory: client/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: astral-sh/setup-uv@v6
        if: steps.version.outputs.changed == 'true'

      - name: Build and publish python client
        if: steps.version.outputs.changed == 'true'
        run: uv build && uv publish
        working-directory: client/python

      - name: Update CLI dependency and lockfile
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          jq --arg v "^$VERSION" '.dependencies["@hiver.sh/client"] = $v' \
            cli/package.json > cli/package.json.tmp && mv cli/package.json.tmp cli/package.json
          cd cli && npm install

      - name: Install and build CLI
        if: steps.version.outputs.changed == 'true'
        run: npm ci
        working-directory: cli

      - name: Publish CLI to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push dependency update to main
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json cli/package-lock.json
          git commit -m "chore: update @hiver.sh/client dep to v${VERSION}"
          git push origin main

      - name: Tag and release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest=false
