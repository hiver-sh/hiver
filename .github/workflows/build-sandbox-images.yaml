name: Build Sandbox Images

on:
  workflow_call:
    inputs:
      platforms:
        description: Target platforms (comma-separated)
        type: string
        default: linux/amd64,linux/arm64
  workflow_dispatch:
    inputs:
      platforms:
        description: Target platforms (comma-separated)
        type: string
        default: linux/amd64,linux/arm64

jobs:
  build-sandbox-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Load hiver images
        uses: actions/download-artifact@v4
        with:
          name: hiver-images
      - run: docker load -i images.tar

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the built CLI as `hiver`
        uses: actions/download-artifact@v4
        with:
          name: hiver-cli
      - name: Put `hiver` on PATH
        run: |
          tar xzf hiver-cli.tgz
          chmod +x cli/packages/commands/bin.js
          sudo ln -sf "$PWD/cli/packages/commands/bin.js" /usr/local/bin/hiver
          hiver --help >/dev/null

      - name: Bundle and push sandbox images
        run: make bundle-sandbox-images PLATFORMS=${{ inputs.platforms }}

      - name: Save sandbox images as artifact
        run: |
          docker save \
            hiversh/agent-cli:latest \
            hiversh/python:3.13-alpine \
            hiversh/node:alpine \
            -o sandbox-images.tar

      - uses: actions/upload-artifact@v4
        with:
          name: hiver-sandbox-images
          path: sandbox-images.tar
          retention-days: 1
