name: Release

on:
  workflow_dispatch:

jobs:
  build-cli:
    uses: ./.github/workflows/build-cli.yaml

  publish:
    needs: [build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version
        id: version
        run: |
          CURRENT=$(jq -r .version cli/package.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Assert client version matches CLI
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          CLIENT_VERSION=$(jq -r .version client/typescript/package.json)
          if [ "$CLIENT_VERSION" != "$VERSION" ]; then
            echo "Error: @hiver.sh/client version ($CLIENT_VERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi
          PYTHON_VERSION=$(grep '^version = ' client/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYTHON_VERSION" != "$VERSION" ]; then
            echo "Error: hiver-py version ($PYTHON_VERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi
          CHART_VERSION=$(grep '^version:' deployment/k8s/chart/Chart.yaml | awk '{print $2}')
          CHART_APPVERSION=$(grep '^appVersion:' deployment/k8s/chart/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          if [ "$CHART_VERSION" != "$VERSION" ] || [ "$CHART_APPVERSION" != "$VERSION" ]; then
            echo "Error: Helm chart version ($CHART_VERSION) / appVersion ($CHART_APPVERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Build and publish typescript client
        run: |
          npm ci
          npm run build
          PKG=$(jq -r .name package.json)
          VER=$(jq -r .version package.json)
          if [ -n "$(npm view "$PKG@$VER" version 2>/dev/null)" ]; then
            echo "$PKG@$VER already published, skipping."
          else
            npm publish --provenance
          fi
        working-directory: client/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: astral-sh/setup-uv@v6

      - name: Build and publish python client
        run: |
          PKG=$(grep -E '^name = ' pyproject.toml | sed 's/name = "\(.*\)"/\1/')
          VER=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/$PKG/$VER/json")" = "200" ]; then
            echo "$PKG $VER already published, skipping."
          else
            uv build && uv publish
          fi
        working-directory: client/python

      - name: Update CLI dependency and lockfile
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          jq --arg v "^$VERSION" '.dependencies["@hiver.sh/client"] = $v' \
            cli/package.json > cli/package.json.tmp && mv cli/package.json.tmp cli/package.json
          cd cli && npm install

      - name: Install and build CLI
        run: npm ci
        working-directory: cli

      - name: Publish CLI to npm
        run: |
          PKG=$(jq -r .name package.json)
          VER=$(jq -r .version package.json)
          if [ -n "$(npm view "$PKG@$VER" version 2>/dev/null)" ]; then
            echo "$PKG@$VER already published, skipping."
          else
            npm publish --provenance
          fi
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push dependency update to main
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json cli/package-lock.json
          if git diff --cached --quiet; then
            echo "No dependency changes to commit, skipping."
          else
            git commit -m "chore: update @hiver.sh/client dep to v${VERSION}"
            git push origin main
          fi

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag push."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              --latest=false
          fi

  # The microvm runtime (hiversh/core) is built `FROM hiversh/vmlinux:<KERNEL_VERSION>`
  # and copies the guest kernel into the image, so the core build below can't resolve
  # its FROM unless this tag exists in the registry. Compiling a kernel from source is
  # slow and only changes on a version bump, so build+push only when the tag is missing.
  push-vmlinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push guest kernel if missing
        run: |
          # Single source of truth for the kernel version is the Makefile.
          KERNEL_VERSION=$(grep -E '^KERNEL_VERSION' Makefile | head -1 | awk '{print $NF}')
          if docker manifest inspect "hiversh/vmlinux:${KERNEL_VERSION}" >/dev/null 2>&1; then
            echo "hiversh/vmlinux:${KERNEL_VERSION} already exists, skipping."
          else
            make buildx-builder
            make publish-vmlinux KERNEL_VERSION="${KERNEL_VERSION}" PLATFORMS=linux/amd64,linux/arm64
          fi

  # Build and push the runtime images (controller/core/gateway). The bundler
  # (`FROM hiversh/core`) pulls hiversh/core, so this is the only prerequisite for
  # sandbox bundling — it runs in parallel with the package publishing in `publish`.
  # Needs push-vmlinux so the core build can resolve `FROM hiversh/vmlinux`.
  push-runtime-images:
    needs: [push-vmlinux]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          CURRENT=$(jq -r .version cli/package.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push runtime images
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          make buildx-builder && make publish-images PLATFORMS=linux/amd64,linux/arm64
          for img in controller core gateway; do
            docker buildx imagetools create \
              --tag hiversh/$img:$VERSION \
              hiversh/$img:latest
          done

      - name: Build and push agent-base-standalone image
        run: make build-agent-base PLATFORMS=linux/amd64,linux/arm64

  # Bundle each sandbox image in its own job so they build in parallel. The bundler
  # pulls hiversh/core, so the only prerequisite is push-runtime-images (the core
  # image built for this release) — not the package publishing in `publish`.
  bundle-sandbox-images:
    needs: [build-cli, push-runtime-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: ./docker/agent-base
            tag: hiversh/agent-base:latest
          - source: ./docker/claude
            tag: hiversh/claude:latest
          - source: ./docker/codex
            tag: hiversh/codex:latest
          - source: ./docker/copilot
            tag: hiversh/copilot:latest
          - source: ./docker/openclaw
            tag: hiversh/openclaw:latest
          - source: ./docker/antigravity
            tag: hiversh/antigravity:latest
          - source: ./docker/browser
            tag: hiversh/browser:latest
          - source: python:3.13-alpine
            tag: hiversh/python:3.13-alpine
          - source: node:alpine
            tag: hiversh/node:alpine
          - source: ./docker/agent-base
            tag: hiversh/agent-base:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/claude
            tag: hiversh/claude:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/codex
            tag: hiversh/codex:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/copilot
            tag: hiversh/copilot:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/openclaw
            tag: hiversh/openclaw:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/antigravity
            tag: hiversh/antigravity:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/browser
            tag: hiversh/browser:latest-microvm
            bundler-flags: "--microvm"
          - source: python:3.13-alpine
            tag: hiversh/python:3.13-alpine-microvm
            bundler-flags: "--microvm"
          - source: node:alpine
            tag: hiversh/node:alpine-microvm
            bundler-flags: "--microvm"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the built CLI as `hiver`
        uses: actions/download-artifact@v4
        with:
          name: hiver-cli
      - name: Put `hiver` on PATH
        run: |
          tar xzf hiver-cli.tgz
          chmod +x cli/packages/commands/bin.js
          sudo ln -sf "$PWD/cli/packages/commands/bin.js" /usr/local/bin/hiver
          hiver --help >/dev/null

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bundle and push ${{ matrix.tag }}
        run: |
          hiver bundle ${{ matrix.source }} \
            --entrypoint="tail -f /dev/null" \
            ${{ matrix.bundler-flags }} \
            --tag ${{ matrix.tag }} \
            --push \
            --platform linux/amd64,linux/arm64

  # Versioned tags reference the unversioned manifests pushed by the matrix above,
  # so this must wait for every bundle job to finish.
  tag-sandbox-images:
    needs: [push-runtime-images, bundle-sandbox-images]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag versioned sandbox images
        env:
          VERSION: ${{ needs.push-runtime-images.outputs.version }}
        run: |
          for img in agent-base claude codex copilot openclaw antigravity browser; do
            docker buildx imagetools create \
              --tag hiversh/$img:$VERSION \
              hiversh/$img:latest
            docker buildx imagetools create \
              --tag hiversh/$img:$VERSION-microvm \
              hiversh/$img:latest-microvm
          done
          docker buildx imagetools create \
            --tag hiversh/python:$VERSION-3.13-alpine \
            hiversh/python:3.13-alpine
          docker buildx imagetools create \
            --tag hiversh/node:$VERSION-alpine \
            hiversh/node:alpine
          docker buildx imagetools create \
            --tag hiversh/python:$VERSION-3.13-alpine-microvm \
            hiversh/python:3.13-alpine-microvm
          docker buildx imagetools create \
            --tag hiversh/node:$VERSION-alpine-microvm \
            hiversh/node:alpine-microvm

  # Package the Helm chart (already synced to the CLI version by
  # scripts/sync-client-version.sh and asserted in `publish`) and publish it to
  # the gh-pages Helm repo at https://hiver-sh.github.io/hiver, which Artifact Hub
  # indexes. Needs the image jobs so both the :latest[-microvm] tags this release
  # just pushed and the versioned tags exist:
  #   1. update-digests.sh refreshes values.yaml :latest[-microvm]@digest to this
  #      release's images and commits that to main (dev convenience).
  #   2. pin-release-images.sh then re-points the packaged copy at the matching
  #      hiversh/*:<version> digests — that's what ships in the chart.
  publish-chart:
    needs: [publish, push-runtime-images, tag-sandbox-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "current=$(jq -r .version cli/package.json)" >> $GITHUB_OUTPUT

      # chart-releaser needs the gh-pages branch to exist; create it once (empty)
      # if this is the first chart release. Done before touching the working tree.
      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            SHA=$(git rev-parse HEAD)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            git commit --allow-empty -m "chore: init gh-pages"
            git push origin gh-pages
            git checkout "$SHA"
          fi

      # Refresh values.yaml's :latest[-microvm]@digest pins to the images this
      # release just pushed, and commit them to main so `helm install .` off main
      # tracks the latest release. Rebase onto origin/main first — the `publish`
      # job already pushed the client dep-bump commit there.
      - name: Refresh and commit latest image digests to main
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          git fetch origin main
          git checkout -B main origin/main
          deployment/k8s/update-digests.sh
          git add deployment/k8s/chart/values.yaml
          if git diff --cached --quiet; then
            echo "Digests already current, nothing to commit."
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "chore: pin chart images to v${VERSION} digests"
            git push origin main
          fi

      # Re-point the working-tree copy at the versioned digests for packaging only
      # (not committed — main keeps :latest). Runs after the commit above so it
      # rewrites the freshly-refreshed values.yaml.
      - name: Pin chart images to this release
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: deployment/k8s/pin-release-images.sh "${VERSION}"

      - uses: azure/setup-helm@v4

      - name: Package and publish chart to gh-pages
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: deployment/k8s
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Artifact Hub reads artifacthub-repo.yml from the repo root (gh-pages root).
      # Sync it out-of-band from chart-releaser (which only manages index.yaml and
      # the chart packages) via a detached worktree on gh-pages.
      - name: Publish artifacthub-repo.yml to gh-pages
        run: |
          git fetch origin gh-pages
          tmp=$(mktemp -d)
          git worktree add --detach "$tmp" origin/gh-pages
          cp deployment/k8s/artifacthub-repo.yml "$tmp/artifacthub-repo.yml"
          git -C "$tmp" add artifacthub-repo.yml
          if ! git -C "$tmp" diff --cached --quiet; then
            git -C "$tmp" \
              -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: sync artifacthub-repo.yml"
            git -C "$tmp" push origin HEAD:gh-pages
          fi
          git worktree remove --force "$tmp"
