name: Release

on:
  workflow_dispatch:

jobs:
  build-cli:
    uses: ./.github/workflows/build-cli.yaml

  # npm publish (clients + CLI) waits for every image to be pushed AND version-
  # tagged (tag-sandbox-images ⇒ push-runtime-images ⇒ bundle-sandbox-images), so
  # a released CLI never ships ahead of the images it references. The lock JSON
  # from tag-sandbox-images is applied to the CLI's bundled container-config
  # before packing (Bake versioned image tags step below).
  publish:
    needs: [build-cli, tag-sandbox-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the "Push dependency update to main" step can rebase
          # onto a main that advanced during the release run.
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          CURRENT=$(jq -r .version cli/package.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Assert client version matches CLI
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          CLIENT_VERSION=$(jq -r .version client/typescript/package.json)
          if [ "$CLIENT_VERSION" != "$VERSION" ]; then
            echo "Error: @hiver.sh/client version ($CLIENT_VERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi
          PYTHON_VERSION=$(grep '^version = ' client/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYTHON_VERSION" != "$VERSION" ]; then
            echo "Error: hiver-py version ($PYTHON_VERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi
          CHART_VERSION=$(grep '^version:' deployment/k8s/chart/Chart.yaml | awk '{print $2}')
          CHART_APPVERSION=$(grep '^appVersion:' deployment/k8s/chart/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          if [ "$CHART_VERSION" != "$VERSION" ] || [ "$CHART_APPVERSION" != "$VERSION" ]; then
            echo "Error: Helm chart version ($CHART_VERSION) / appVersion ($CHART_APPVERSION) does not match CLI version ($VERSION). Run scripts/sync-client-version.sh."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      # Pull the lock JSON (the versioned tags tag-sandbox-images just pushed) and
      # bake it into the CLI's bundled container-config so the published CLI's
      # `hiver up`/`hiver start` reference this release's images, not `:latest`.
      # Working-tree edit only — the "Push dependency update to main" commit below
      # is scoped to cli/package.json + lockfile, so this is not committed.
      - uses: actions/download-artifact@v4
        with:
          name: sandbox-image-tags
      - name: Bake versioned image tags into CLI container-config
        run: HIVER_IMAGE_LOCK="$PWD/sandbox-images.lock.json" node cli/scripts/apply-image-tags.mjs

      - name: Build and publish typescript client
        run: |
          npm ci
          npm run build
          PKG=$(jq -r .name package.json)
          VER=$(jq -r .version package.json)
          if [ -n "$(npm view "$PKG@$VER" version 2>/dev/null)" ]; then
            echo "$PKG@$VER already published, skipping."
          else
            npm publish --provenance
          fi
        working-directory: client/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: astral-sh/setup-uv@v6

      - name: Build and publish python client
        run: |
          PKG=$(grep -E '^name = ' pyproject.toml | sed 's/name = "\(.*\)"/\1/')
          VER=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/$PKG/$VER/json")" = "200" ]; then
            echo "$PKG $VER already published, skipping."
          else
            uv build && uv publish
          fi
        working-directory: client/python

      # `npm publish` returning 200 does not mean the version is installable yet:
      # the registry's read path is a CDN whose cached resources warm
      # independently, so a publish becomes visible on one resource before
      # another.
      #
      # This must poll the *packument* (the whole-package document), because that
      # is what `npm install` resolves a `^` range against. An earlier version of
      # this step polled /<pkg>/<version> instead — a separately cached resource
      # that goes live earlier — so the wait passed while the packument was still
      # stale and the install below died with ETARGET.
      #
      # Resolve through npm itself, with a throwaway cache and --prefer-online, so
      # the check runs the same code path as the install (same range, same semver
      # resolution) and nothing local can answer for us. Require consecutive hits,
      # since one success can come from a single warm edge while others are cold.
      - name: Wait for @hiver.sh/client to be resolvable on npm
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          NEEDED=3
          streak=0
          for attempt in $(seq 1 60); do
            cache=$(mktemp -d)
            got=$(npm view "@hiver.sh/client@^${VERSION}" version \
                    --cache "$cache" --prefer-online 2>/dev/null \
                    | tail -1 | tr -d "'\" ")
            rm -rf "$cache"
            if [ -n "$got" ]; then
              streak=$((streak + 1))
              echo "Resolved ^${VERSION} -> ${got} (${streak}/${NEEDED} consecutive)."
              if [ "$streak" -ge "$NEEDED" ]; then
                exit 0
              fi
            else
              if [ "$streak" -gt 0 ]; then
                echo "Resolution regressed (stale CDN edge); resetting streak."
              fi
              streak=0
              echo "Not resolvable yet (attempt ${attempt}/60)."
            fi
            sleep 5
          done
          echo "Error: @hiver.sh/client@^${VERSION} not resolvable after 5 minutes." >&2
          exit 1

      - name: Update CLI dependency and lockfile
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          jq --arg v "^$VERSION" '.dependencies["@hiver.sh/client"] = $v' \
            cli/package.json > cli/package.json.tmp && mv cli/package.json.tmp cli/package.json
          cd cli
          # Second line of defence behind the wait above: CDN edges warm
          # independently, so this install can still draw a stale packument even
          # after the check passed. A transient ETARGET must not fail a release
          # that has already published both clients — retry instead.
          for attempt in 1 2 3 4 5; do
            if npm install --prefer-online; then
              exit 0
            fi
            echo "npm install failed (attempt ${attempt}/5); retrying in 15s."
            sleep 15
          done
          echo "Error: npm install failed after 5 attempts." >&2
          exit 1

      - name: Install and build CLI
        run: npm ci
        working-directory: cli

      - name: Publish CLI to npm
        run: |
          PKG=$(jq -r .name package.json)
          VER=$(jq -r .version package.json)
          if [ -n "$(npm view "$PKG@$VER" version 2>/dev/null)" ]; then
            echo "$PKG@$VER already published, skipping."
          else
            npm publish --provenance
          fi
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push dependency update to main
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json cli/package-lock.json
          if git diff --cached --quiet; then
            echo "No dependency changes to commit, skipping."
          else
            git commit -m "chore: update @hiver.sh/client dep to v${VERSION}"
            # main can advance during the release run (another push landing
            # between checkout and here), which rejects a plain push. Rebase our
            # single dep-bump commit onto the latest main and retry.
            #
            # --autostash is required, not defensive: the "Bake versioned image
            # tags" step above deliberately leaves its container-config edit
            # uncommitted, and the commit here is scoped to package.json +
            # lockfile, so the working tree ALWAYS has unstaged changes at this
            # point. A plain `git rebase` aborts with "cannot rebase: You have
            # unstaged changes", which made this retry loop fail every single
            # time main advanced — the exact case it exists to handle.
            for attempt in 1 2 3 4 5; do
              if git push origin main; then
                exit 0
              fi
              echo "Push rejected (attempt ${attempt}); rebasing onto origin/main and retrying."
              git fetch origin main
              git rebase --autostash origin/main
            done
            echo "Error: failed to push dependency update after retries." >&2
            exit 1
          fi

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag push."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              --latest=false
          fi

  # The microvm runtime (hiversh/core) is built `FROM hiversh/vmlinux:<KERNEL_VERSION>`
  # and copies the guest kernel into the image, so the core build below can't resolve
  # its FROM unless this tag exists in the registry. Compiling a kernel from source is
  # slow and only changes on a version bump, so build+push only when the tag is missing.
  push-vmlinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push guest kernel if missing
        run: |
          # Single source of truth for the kernel version is the Makefile.
          KERNEL_VERSION=$(grep -E '^KERNEL_VERSION' Makefile | head -1 | awk '{print $NF}')
          if docker manifest inspect "hiversh/vmlinux:${KERNEL_VERSION}" >/dev/null 2>&1; then
            echo "hiversh/vmlinux:${KERNEL_VERSION} already exists, skipping."
          else
            make buildx-builder
            make publish-vmlinux KERNEL_VERSION="${KERNEL_VERSION}" PLATFORMS=linux/amd64,linux/arm64
          fi

  # Build and push the runtime images (controller/core/gateway). The bundler
  # (`FROM hiversh/core`) pulls hiversh/core, so this is the only prerequisite for
  # sandbox bundling — it runs in parallel with the package publishing in `publish`.
  # Needs push-vmlinux so the core build can resolve `FROM hiversh/vmlinux`.
  push-runtime-images:
    needs: [push-vmlinux]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          CURRENT=$(jq -r .version cli/package.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push runtime images
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          # Idempotent re-runs (e.g. finishing a half-completed release): if every
          # runtime image is already tagged for this version, don't rebuild/re-push
          # — that would move the versioned tags to fresh digests the already-
          # published CLI never referenced. Mirrors the push-vmlinux guard.
          if docker manifest inspect "hiversh/controller:${VERSION}" >/dev/null 2>&1 \
            && docker manifest inspect "hiversh/core:${VERSION}" >/dev/null 2>&1 \
            && docker manifest inspect "hiversh/gateway:${VERSION}" >/dev/null 2>&1; then
            echo "hiversh/{controller,core,gateway}:${VERSION} already exist, skipping build and push."
            exit 0
          fi
          make buildx-builder && make publish-images PLATFORMS=linux/amd64,linux/arm64
          for img in controller core gateway; do
            docker buildx imagetools create \
              --tag hiversh/$img:$VERSION \
              hiversh/$img:latest
          done

      - name: Build and push agent-base-standalone image
        run: make build-agent-base PLATFORMS=linux/amd64,linux/arm64

  # Bundle each sandbox image in its own job so they build in parallel. The bundler
  # pulls hiversh/core, so the only prerequisite is push-runtime-images (the core
  # image built for this release) — not the package publishing in `publish`.
  bundle-sandbox-images:
    needs: [build-cli, push-runtime-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: ./docker/agent-base
            tag: hiversh/agent-base:latest
          - source: ./docker/claude
            tag: hiversh/claude:latest
          - source: ./docker/codex
            tag: hiversh/codex:latest
          - source: ./docker/copilot
            tag: hiversh/copilot:latest
          - source: ./docker/openclaw
            tag: hiversh/openclaw:latest
          - source: ./docker/antigravity
            tag: hiversh/antigravity:latest
          - source: ./docker/browser
            tag: hiversh/browser:latest
          - source: python:3.13-alpine
            tag: hiversh/python:3.13-alpine
          - source: node:alpine
            tag: hiversh/node:alpine
          - source: ./docker/agent-base
            tag: hiversh/agent-base:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/claude
            tag: hiversh/claude:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/codex
            tag: hiversh/codex:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/copilot
            tag: hiversh/copilot:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/openclaw
            tag: hiversh/openclaw:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/antigravity
            tag: hiversh/antigravity:latest-microvm
            bundler-flags: "--microvm"
          - source: ./docker/browser
            tag: hiversh/browser:latest-microvm
            bundler-flags: "--microvm"
          - source: python:3.13-alpine
            tag: hiversh/python:3.13-alpine-microvm
            bundler-flags: "--microvm"
          - source: node:alpine
            tag: hiversh/node:alpine-microvm
            bundler-flags: "--microvm"
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "current=$(jq -r .version cli/package.json)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the built CLI as `hiver`
        uses: actions/download-artifact@v4
        with:
          name: hiver-cli
      - name: Put `hiver` on PATH
        run: |
          tar xzf hiver-cli.tgz
          chmod +x cli/packages/commands/bin.js
          sudo ln -sf "$PWD/cli/packages/commands/bin.js" /usr/local/bin/hiver
          hiver --help >/dev/null

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bundle and push ${{ matrix.tag }}
        env:
          VERSION: ${{ steps.version.outputs.current }}
          TAG: ${{ matrix.tag }}
        run: |
          # Idempotent re-runs (e.g. finishing a half-completed release): skip if
          # this image's versioned tag already exists, so we don't re-bundle and
          # move :latest to a fresh build the released version never referenced.
          # Derive the versioned tag from the :latest[-microvm] matrix tag exactly
          # as scripts/tag-sandbox-images.sh does (empty->X.Y.Z, *latest*->
          # substitute, else->X.Y.Z-<tag>).
          repo="${TAG%%:*}"; t="${TAG#*:}"; [ "$TAG" = "$t" ] && t=""
          if [ -z "$t" ]; then vt="$VERSION"
          elif [ "${t#*latest}" != "$t" ]; then vt="${t/latest/$VERSION}"
          else vt="${VERSION}-${t}"
          fi
          if docker manifest inspect "${repo}:${vt}" >/dev/null 2>&1; then
            echo "${repo}:${vt} already exists, skipping bundle of ${TAG}."
            exit 0
          fi
          hiver bundle ${{ matrix.source }} \
            --entrypoint="tail -f /dev/null" \
            ${{ matrix.bundler-flags }} \
            --tag "${TAG}" \
            --push \
            --platform linux/amd64,linux/arm64

  # Versioned tags reference the unversioned manifests pushed by the matrix above,
  # so this must wait for every bundle job to finish.
  tag-sandbox-images:
    needs: [push-runtime-images, bundle-sandbox-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Copies each :latest[-microvm] manifest to its immutable hiversh/*:<version>
      # tag (driven by the CLI catalog) and writes sandbox-images.lock.json — the
      # exact tags pushed, consumed downstream by the `publish` job's CLI build.
      - name: Tag versioned sandbox images
        env:
          VERSION: ${{ needs.push-runtime-images.outputs.version }}
        run: scripts/tag-sandbox-images.sh "$VERSION" --lock sandbox-images.lock.json

      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-image-tags
          path: sandbox-images.lock.json
          retention-days: 1

  # Package the Helm chart (already synced to the CLI version by
  # scripts/sync-client-version.sh and asserted in `publish`) and publish it to
  # the gh-pages Helm repo at https://hiver-sh.github.io/hiver, which Artifact Hub
  # indexes. Needs the image jobs so the immutable hiversh/*:<version> tags exist:
  # pin-release-images.sh rewrites the packaged values.yaml from the main-branch
  # :latest tags to those version tags — that's what ships in the chart. main
  # keeps :latest (nothing is committed back here).
  publish-chart:
    needs: [publish, push-runtime-images, tag-sandbox-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "current=$(jq -r .version cli/package.json)" >> $GITHUB_OUTPUT

      # The Helm repo index lives on the gh-pages branch; create it once (empty)
      # if this is the first chart release. Done before touching the working tree.
      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            SHA=$(git rev-parse HEAD)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            git commit --allow-empty -m "chore: init gh-pages"
            git push origin gh-pages
            git checkout "$SHA"
          fi

      # Re-point the working-tree copy at the immutable hiversh/*:<version> tags
      # for packaging only (not committed — main keeps :latest, which always
      # tracks the newest release).
      - name: Pin chart images to this release
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: deployment/k8s/pin-release-images.sh "${VERSION}"

      - uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package deployment/k8s/chart -d .cr-release-packages

      # Attach the chart to the existing v<version> release (created by `publish`)
      # instead of minting a separate hiver-<version> release/tag — one tag per
      # release holds both the source notes and the chart asset.
      - name: Upload chart to the v${{ steps.version.outputs.current }} release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.current }}
        run: gh release upload "v${VERSION}" ".cr-release-packages/hiver-${VERSION}.tgz" --clobber

      # Regenerate the Helm repo index (URLs pointing at the v<version> release
      # asset) and republish it plus artifacthub-repo.yml to the gh-pages root.
      - name: Publish Helm repo index to gh-pages
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          git fetch origin gh-pages
          tmp=$(mktemp -d)
          git worktree add --detach "$tmp" origin/gh-pages
          MERGE=""
          [ -f "$tmp/index.yaml" ] && MERGE="--merge $tmp/index.yaml"
          helm repo index .cr-release-packages \
            --url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}" \
            $MERGE
          cp .cr-release-packages/index.yaml "$tmp/index.yaml"
          cp deployment/k8s/artifacthub-repo.yml "$tmp/artifacthub-repo.yml"
          git -C "$tmp" add index.yaml artifacthub-repo.yml
          if ! git -C "$tmp" diff --cached --quiet; then
            git -C "$tmp" \
              -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: publish hiver chart v${VERSION}"
            git -C "$tmp" push origin HEAD:gh-pages
          fi
          git worktree remove --force "$tmp"
