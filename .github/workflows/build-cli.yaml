name: Build CLI

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & pack the local TypeScript client
        working-directory: client/typescript
        run: |
          npm ci
          npm run build
          npm pack

      - name: Build the CLI against the local client
        working-directory: cli
        run: |
          npm ci
          npm install ../client/typescript/hiver.sh-client-*.tgz
          npm run build
          npm prune --omit=dev

      - name: Package the built CLI
        run: tar czf hiver-cli.tgz cli

      - uses: actions/upload-artifact@v4
        with:
          name: hiver-cli
          path: hiver-cli.tgz
          retention-days: 1
