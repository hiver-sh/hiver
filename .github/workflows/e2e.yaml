name: E2E

on:
  push:
    # Only build + run e2e when code that can affect behavior changes. Docs,
    # workflow-adjacent assets, etc. don't warrant standing up the full stack.
    paths:
      - '**/*.go'
      - '**/*.ts'
      - '**/*.json'
      - '**/*.py'
  workflow_dispatch:

jobs:
  build-images:
    uses: ./.github/workflows/build-runtime-images.yaml
    secrets: inherit

  build-cli:
    uses: ./.github/workflows/build-cli.yaml

  # Rebundle the sandbox images the tests use from THIS run's freshly-built
  # `core` — once — and hand them to every e2e leg as an artifact (mirroring
  # hiver-images). Doing it here rather than per-leg avoids re-pulling the base
  # images and re-baking sandboxd 25 times, and it exercises this run's sandboxd
  # rather than the last-published sandbox images.
  bundle-sandbox-images:
    needs: [build-images, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load the built docker images
        uses: actions/download-artifact@v4
        with:
          name: hiver-images
      - run: docker load -i images.tar

      - name: Install the built CLI as `hiver`
        uses: actions/download-artifact@v4
        with:
          name: hiver-cli
      - name: Put `hiver` on PATH
        run: |
          tar xzf hiver-cli.tgz
          chmod +x cli/packages/commands/bin.js
          sudo ln -sf "$PWD/cli/packages/commands/bin.js" /usr/local/bin/hiver
          hiver --help >/dev/null

      # `hiver bundle` (no --push/--platform) builds single-arch and loads into the
      # local docker store, baking THIS run's sandboxd (hiversh/core, loaded above)
      # into each sandbox image.
      - name: Bundle sandbox images from this run's core
        run: |
          hiver bundle python:3.13-alpine --entrypoint="tail -f /dev/null" --tag hiversh/python:3.13-alpine
          hiver bundle node:alpine --entrypoint="tail -f /dev/null" --tag hiversh/node:alpine

      - name: Save sandbox images as artifact
        run: docker save hiversh/python:3.13-alpine hiversh/node:alpine -o sandbox-images.tar

      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-images
          path: sandbox-images.tar
          retention-days: 1

  # Load this run's images + CLI and run the e2e tests in parallel — one test
  # per matrix leg, each bringing up its own isolated stack. `fail-fast: false`
  # lets every leg report independently. Add more tests by extending
  # `matrix.test`.
  #
  # The cloud-backed FS tests (TestFSAzureE2E, TestFSGCSE2E, TestFSGDriveE2E,
  # TestFSS3E2E) and the GDrive-gated TestMcpServerE2E are intentionally omitted:
  # they self-skip without provider credentials, so a matrix leg would only burn
  # a runner standing up a stack to immediately skip. Add them back (with the
  # matching secrets wired into the env) when those backends are covered in CI.
  e2e:
    needs: [build-images, build-cli, bundle-sandbox-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - TestControllerEventsMultiTenantE2E
          - TestEgressACLE2E
          - TestEgressDNSSinkholeE2E
          - TestEgressEventsE2E
          - TestEgressNonTCPBlockedE2E
          - TestEgressOverrideHostE2E
          - TestEgressRequestOverridesE2E
          - TestEventsLastEventIdE2E
          - TestExecE2E
          - TestFSACLE2E
          - TestFSEventsE2E
          - TestFSExternalE2E
          - TestFileE2E
          - TestMultiTenantApplyConfigMountE2E
          - TestMultiTenantEgressEventsE2E
          - TestMultiTenantIngressE2E
          - TestMultiTenantPackE2E
          - TestMultiTenantSnapshotE2E
          - TestPortsE2E
          - TestSandboxCreationE2E
          - TestShutdownE2E
          - TestSnapshotE2E
          - TestSnapshotFuseE2E
          - TestTTLE2E
          - TestWebSocketE2E
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # `hiver` runs under node (shebang `#!/usr/bin/env node`).
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load the built docker images
        uses: actions/download-artifact@v4
        with:
          name: hiver-images
      - run: docker load -i images.tar

      # The sandbox images (python/node) rebundled from this run's core, so the
      # controller uses them instead of pulling the last-published copies.
      - name: Load the rebundled sandbox images
        uses: actions/download-artifact@v4
        with:
          name: sandbox-images
      - run: docker load -i sandbox-images.tar

      - name: Install the built CLI as `hiver`
        uses: actions/download-artifact@v4
        with:
          name: hiver-cli
      - name: Put `hiver` on PATH
        run: |
          tar xzf hiver-cli.tgz                       # overwrites cli/ with the built version
          chmod +x cli/packages/commands/bin.js
          sudo ln -sf "$PWD/cli/packages/commands/bin.js" /usr/local/bin/hiver
          hiver --help >/dev/null

      # The sandbox container the controller spawns mounts /dev/fuse for the
      # workspace FUSE mount.
      - name: Ensure /dev/fuse is available
        run: |
          sudo modprobe fuse || true
          ls -l /dev/fuse

      - name: Start the stack
        run: |
          hiver up
          # Wait for the gateway to actually answer so the test runs instead of
          # skipping on RequireStack (which probes localhost:10000).
          for i in $(seq 1 60); do
            if curl -sS -o /dev/null http://localhost:10000; then
              echo "gateway reachable"; exit 0
            fi
            sleep 1
          done
          echo "gateway never came up on :10000"; exit 1

      - name: Run ${{ matrix.test }}
        run: go test -v -count=1 -timeout 15m -run "^${{ matrix.test }}$" ./test/e2e/...

      - name: Stack diagnostics on failure
        if: failure()
        run: |
          docker ps -a || true
          docker compose -f docker/compose.yaml logs || true
