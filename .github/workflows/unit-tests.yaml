name: Unit tests

on:
  push:
    # Only run lint + tests when code that can affect them changes.
    paths:
      - '**/*.go'
      - '**/*.ts'
      - '**/*.json'
      - '**/*.py'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # go vet + staticcheck's unused (U1000) check. Fails the build on dead code
      # (unused consts/funcs/vars) that `go vet` alone doesn't catch.
      - run: make lint-go

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: make test-unit

  test-ts-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: client/typescript

      - run: npm test
        working-directory: client/typescript

  test-go-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go/go.mod

      - run: go test ./...
        working-directory: client/go

  test-python-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e ".[dev]"
        working-directory: client/python

      - run: pytest tests/
        working-directory: client/python
