openapi: 3.0.0
info:
  title: MCP Sandbox Server
  version: 0.0.1
  summary: MCP server provides sandbox functionality.
  description: |
    Provides Bash, Read, Write, Grep, Edit tools.

servers:
  - url: http://localhost:8081
    description: MCP server endpoint.

paths:
  /v1/mcp:
    post:
      tags: [MCP]
      summary: Send an MCP request.
      operationId: mcpRequest
      description: |
        Implements the Model Context Protocol Streamable HTTP
        transport. The request body is a JSON-RPC 2.0 envelope; the
        response is either a single JSON-RPC envelope (for simple
        request/response calls) or a Server-Sent Events stream (for
        long-running calls and progress notifications).

        ## Tools

        The server advertises the following tools through `tools/list`:

          * `get_config`   — equivalent to `GET /v1/config`. Takes no
                             arguments; returns the current
                             `SandboxConfig`.
          * `apply_config` — equivalent to `PUT /v1/config`. Takes a
                             `SandboxConfig` as its argument; returns
                             an `ApplyResult`.

        ## Sessions

        Clients that need session continuity (for example, to resume an
        in-flight stream after a network blip) may set
        `Mcp-Session-Id` on requests. Servers that issue a session ID
        return it in the response header of the same name.
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: false
          schema: { type: string }
          description: Optional client-supplied session identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/JSONRPCRequest'
                - $ref: '#/components/schemas/JSONRPCNotification'
                - type: array
                  description: A JSON-RPC batch.
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/JSONRPCRequest'
                      - $ref: '#/components/schemas/JSONRPCNotification'
            examples:
              listTools:
                summary: List available MCP tools
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: tools/list
              callApplyConfig:
                summary: Call the apply_config tool
                value:
                  jsonrpc: "2.0"
                  id: 2
                  method: tools/call
                  params:
                    name: apply_config
                    arguments:
                      agent:
                        image: my-agent:latest
                      fs:
                        - mount: /workspace
                          backend: local
                          acls:
                            - { path: /workspace, access: rw }
      responses:
        '200':
          description: A JSON-RPC response, or an SSE stream when the call carries follow-up messages.
          headers:
            Mcp-Session-Id:
              schema: { type: string }
              description: Echoed when the server is operating in session mode.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/JSONRPCResponse'
                  - type: array
                    items: { $ref: '#/components/schemas/JSONRPCResponse' }
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each `data:` payload is a
                  JSON-RPC `JSONRPCResponse` or `JSONRPCNotification`.
        '202':
          description: A notification was accepted. The body is empty.
        '400':
          description: The request was not a valid JSON-RPC envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JSONRPCResponse' }

    get:
      tags: [MCP]
      summary: Open a server-to-client SSE stream.
      operationId: mcpStream
      description: |
        Opens a Server-Sent Events stream the server can use to push
        notifications and out-of-band responses to the client. Servers
        that do not initiate messages outside of request/response
        return `405 Method Not Allowed`.
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: false
          schema: { type: string }
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                description: Stream of JSON-RPC notifications and responses.
        '405':
          description: This server does not push messages outside of request/response.

    delete:
      tags: [MCP]
      summary: Terminate an MCP session.
      operationId: mcpDelete
      description: |
        Closes the session identified by `Mcp-Session-Id`. The server
        releases all per-session state. Subsequent requests carrying
        the same session id will be rejected with `404 Not Found`.
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: true
          schema: { type: string }
          description: Identifier of the session to close.
      responses:
        '204':
          description: Session closed.
        '400':
          description: The `Mcp-Session-Id` header was missing.
        '404':
          description: No session with that id exists.

components:
  schemas:
    JSONRPCRequest:
      type: object
      description: A JSON-RPC 2.0 request envelope.
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          description: Client-chosen request identifier echoed back in the response.
          oneOf:
            - { type: string }
            - { type: integer }
        method:
          type: string
          description: |
            MCP method name, e.g. `initialize`, `tools/list`,
            `tools/call`, `resources/list`, `resources/read`,
            `prompts/list`, `prompts/get`.
          example: tools/call
        params:
          description: Method parameters. Schema depends on `method`.
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: array, items: {} }

    JSONRPCNotification:
      type: object
      description: |
        A JSON-RPC 2.0 notification envelope (no `id`, no response
        expected).
      required: [jsonrpc, method]
      additionalProperties: false
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
        params:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: array, items: {} }

    JSONRPCResponse:
      type: object
      description: |
        A JSON-RPC 2.0 response envelope. Exactly one of `result` or
        `error` is present.
      required: [jsonrpc, id]
      additionalProperties: false
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - { type: string }
            - { type: integer }
        result:
          description: |
            Method result. Shape depends on the called method — for
            example, `tools/call` returns a `CallToolResult` with a
            `content` array and `isError` flag.
        error:
          $ref: '#/components/schemas/JSONRPCError'

    JSONRPCError:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          type: integer
          description: |
            Standard JSON-RPC error code. `-32700` parse error,
            `-32600` invalid request, `-32601` method not found,
            `-32602` invalid params, `-32603` internal error.
            Application errors use codes in the range `-32000` to
            `-32099`.
        message:
          type: string
        data:
          description: Optional structured error context.
