openapi: 3.0.0
info:
  title: Sandbox API
  version: 0.0.1
  summary: Manage a sandbox's file systems and network egress declaratively.
  description: |
    The Sandbox API exposes a single declarative configuration
    document — `SandboxConfig. Submit the desired
    configuration and the API computes the minimum set of changes
    required to converge the running sandbox to that state.

servers:
  - url: http://localhost:8080
    description: Sandbox config endpoint.

tags:
  - name: Configuration
    description: Read and apply the sandbox's configuration document.
  - name: Files
    description: Move file contents into the sandbox.
  - name: Proxy
    description: Reach the HTTP service exposed by the sandbox container.
  - name: Execution
    description: Run commands inside the sandbox.
  - name: MCP
    description: Model Context Protocol Streamable HTTP transport.

paths:
  /v1/config:
    get:
      tags: [Configuration]
      summary: Read the current configuration.
      operationId: getConfig
      description: Returns the `SandboxConfig` currently in effect.
      responses:
        '200':
          description: The current configuration.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/SandboxConfig' }

    put:
      tags: [Configuration]
      summary: Apply a desired configuration.
      operationId: applyConfig
      description: |
        Compares the supplied desired configuration with the current
        applied state and applies the additions and removals needed
        to converge. Returns the post-apply configuration and a
        `Changes` document describing what was added or removed.

        The call is atomic: if any individual change fails, the entire
        apply is rolled back and `applied` is `false`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './config.yaml#/components/schemas/SandboxConfig' }
            examples:
              addFileSystem:
                summary: Add a Google Drive file system to an existing sandbox
                value:
                  agent:
                    image: my-agent:latest
                  fs:
                    - mount: /workspace
                      backend: local
                      acls:
                        - { path: /workspace, access: rw }
                        - { path: /workspace/**, access: rw }
                    - mount: /drive
                      backend: gdrive
                      gdrive_access_token: ya29.example
                      gdrive_folder_id: 1QWodtGM...
                      acls:
                        - { path: /drive, access: rw }
                        - { path: /drive/**, access: rw }
                  egress:
                    allow:
                      - host: api.github.com
                        methods: [GET]
                        paths: [/repos/*]
      responses:
        '200':
          description: Apply attempted. Inspect `applied` and `changes`.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/ApplyResult' }
        '400':
          description: The supplied configuration is invalid.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '409':
          description: A previous apply is still in progress.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/file:
    get:
      tags: [Files]
      summary: Download a file from a sandbox mount.
      operationId: getFile
      description: |
        Stream the contents of a single file living under one of the
        configured `SandboxConfig.fs` mounts. The `path` query
        parameter is the agent-visible absolute path (e.g.
        `/workspace/data.csv`) and must resolve to a regular file
        beneath one of the configured mount roots.

        Like `POST /v1/file`, the read bypasses the destination
        mount's ACLs — the control-plane is higher privilege than
        the workload.
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: |
            Agent-visible absolute path to read. Must be inside one
            of the configured `fs[].mount` directories.
          example: /workspace/data.csv
      responses:
        '200':
          description: The file contents.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: |
                `attachment; filename="<basename>"`, where `<basename>`
                is the last path component of `path`.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: The request is malformed (missing `path`, traversal, …).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: |
            `path` is not under any configured mount, or no regular
            file exists at the resolved location.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

    post:
      tags: [Files]
      summary: Upload a file into a sandbox mount.
      operationId: uploadFile
      description: |
        Upload a single file to a configured file system mount. The
        `destination` field must exactly match one of the `mount`
        paths in the active `SandboxConfig.fs`. The file is written
        at `<destination>/<filename>`, where `<filename>` is the
        basename of the uploaded file's `Content-Disposition`
        `filename` parameter.

        The write bypasses the destination mount's ACLs, so the per-path
        rules that govern the agent's own filesystem access do not apply
        here.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [destination, file]
              properties:
                destination:
                  type: string
                  description: |
                    Mount path to write into. Must match a configured
                    `fs[].mount` exactly.
                  example: /workspace
                file:
                  type: string
                  format: binary
                  description: File contents.
            encoding:
              file:
                contentType: application/octet-stream
      responses:
        '200':
          description: File written.
          content:
            application/json:
              schema:
                type: object
                required: [path, bytes]
                additionalProperties: false
                properties:
                  path:
                    type: string
                    description: Absolute path the file was written to.
                    example: /workspace/data.csv
                  bytes:
                    type: integer
                    format: int64
                    description: Number of bytes written.
        '400':
          description: The request is malformed (missing fields, wrong content type, …).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: The `destination` does not match any configured mount.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/directories:
    get:
      tags: [Files]
      summary: List the contents of a directory under a sandbox mount.
      operationId: listDirectory
      description: |
        Returns the immediate children of a directory that lives under one
        of the configured `SandboxConfig.fs` mounts. The `path` query
        parameter is the agent-visible absolute path (e.g. `/workspace`)
        and must resolve to a directory beneath one of the configured
        mount roots.

        Like `/v1/file`, the read bypasses the destination mount's ACLs.
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: |
            Agent-visible absolute path of the directory to list. Must be
            inside one of the configured `fs[].mount` directories.
          example: /workspace
      responses:
        '200':
          description: Directory listing.
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                additionalProperties: false
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [name, path, is_dir, size]
                      additionalProperties: false
                      properties:
                        name:
                          type: string
                          description: Basename of the entry.
                          example: data.csv
                        path:
                          type: string
                          description: Agent-visible absolute path of the entry.
                          example: /workspace/data.csv
                        is_dir:
                          type: boolean
                          description: True if the entry is a directory.
                        size:
                          type: integer
                          format: int64
                          description: File size in bytes; 0 for directories.
        '400':
          description: The request is malformed (missing `path`, traversal, …).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: |
            `path` is not under any configured mount, or no directory
            exists at the resolved location.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/events:
    get:
      summary: Open the SSE event stream.
      operationId: getEvents
      description: |
        Opens a long-lived Server-Sent Events stream of `SandboxEvent`
        payloads. The connection stays open for as long as the client
        is willing to read; the server pushes one SSE `data:` frame per
        event in the order events occur.

        ## Resuming after a disconnect

        Pass the `id` of the last event the client successfully
        processed as `lastEventId`. The server will replay every event
        with a greater id and then continue with new events as they
        happen. Omit `lastEventId` to start from the next event the
        sandbox emits — past events are not replayed in that case.

        ## Framing

        Each SSE frame is a single `data:` line whose value is a
        JSON-encoded `SandboxEvent`. The SSE `id:` field mirrors the
        event's `id`, so SSE-aware clients (including browsers, which
        send `Last-Event-ID` automatically on reconnect) can resume
        without inspecting the payload.
      parameters:
        - in: query
          name: lastEventId
          schema:
            type: integer
          description: |
            Resume the stream after this event id. Only events with a
            strictly greater `id` will be sent. Omit to start from the
            next new event.
      responses:
        '200':
          description: |
            SSE stream opened. The response is open-ended; the server
            keeps writing frames until the client disconnects or the
            sandbox shuts down.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each `data:` payload is a
                  JSON-encoded `SandboxEvent`.

  /v1/exec:
    post:
      tags: [Execution]
      summary: Execute a command and return buffered output.
      operationId: exec
      description: |
        Runs a command inside the sandbox and waits for it to finish.
        Returns the complete stdout, stderr, and exit code in a single
        JSON response. Use `/v1/exec-stream` instead when you need
        output incrementally.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecRequest' }
      responses:
        '200':
          description: Command finished. Inspect `exit_code` for success/failure.
          content:
            application/json:
              schema:
                type: object
                required: [stdout, stderr, exit_code]
                additionalProperties: false
                properties:
                  stdout:
                    type: string
                    description: Complete text written to stdout.
                  stderr:
                    type: string
                    description: Complete text written to stderr.
                  exit_code:
                    type: integer
                    description: Process exit code.
        '400':
          description: The request body is malformed.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/exec-stream/{id}:
    post:
      tags: [Execution]
      summary: Execute a command and stream output as SSE.
      operationId: execStream
      description: |
        Runs a command inside the sandbox and streams its output as a
        Server-Sent Events stream. Each SSE frame carries an `event:`
        field of `stdout`, `stderr`, or `exit`, and a `data:` field
        with the payload.

        `stdout` and `stderr` frames carry the raw text written to the
        respective stream. The `exit` frame is always the last frame;
        its `data:` is a JSON object `{"code": <int>}` with the
        process exit code.

        The stream closes after the `exit` frame is written. Use
        `/v1/exec` instead when you only need the final buffered result.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Client-set unique identifier for this process.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecStreamRequest' }
      responses:
        '200':
          description: |
            SSE stream opened. Frames arrive in order with `event:` set
            to `stdout`, `stderr`, or `exit`. The stream closes after
            the `exit` frame.
          content:
            text/event-stream:
              schema:
                description: |
                  Server-Sent Events stream. Each `data:` payload is a
                  JSON-encoded `ExecEvent`. The `event:` field matches
                  the `type` discriminator.
                oneOf:
                  - $ref: '#/components/schemas/ExecStdoutEvent'
                  - $ref: '#/components/schemas/ExecStderrEvent'
                  - $ref: '#/components/schemas/ExecExitEvent'
                discriminator:
                  propertyName: type
                  mapping:
                    stdout: '#/components/schemas/ExecStdoutEvent'
                    stderr: '#/components/schemas/ExecStderrEvent'
                    exit:   '#/components/schemas/ExecExitEvent'
        '400':
          description: The request body is malformed.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/exec-stream/{id}/stdin:
    post:
      tags: [Execution]
      summary: Write to a running process's stdin.
      operationId: execStreamStdin
      description: |
        Sends data to the stdin of a process started with `/v1/exec-stream/{id}`.
        Returns 404 if no process with the given id is running.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The id of the running process.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              additionalProperties: false
              properties:
                data:
                  type: string
                  description: Text to write to the process's stdin.
      responses:
        '204':
          description: Data written to stdin.
        '404':
          description: No running process found with the given id.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/ping:
    get:
      tags: [Configuration]
      summary: Send a ping to the sandbox.
      operationId: Ping
      description: Resets the sandbox shutdown timer.
      responses:
        '200':
          description: Ping received.

  /v1/mcp:
    post:
      tags: [MCP]
      summary: Send an MCP request.
      operationId: mcpRequest
      description: |
        Implements the Model Context Protocol Streamable HTTP
        transport. The request body is a JSON-RPC 2.0 envelope; the
        response is either a single JSON-RPC envelope (for simple
        request/response calls) or a Server-Sent Events stream (for
        long-running calls and progress notifications).

        ## Tools

        The server advertises the following tools through `tools/list`:

          * `get_config`   — equivalent to `GET /v1/config`. Takes no
                             arguments; returns the current
                             `SandboxConfig`.
          * `apply_config` — equivalent to `PUT /v1/config`. Takes a
                             `SandboxConfig` as its argument; returns
                             an `ApplyResult`.

        ## Sessions

        Clients that need session continuity (for example, to resume an
        in-flight stream after a network blip) may set
        `Mcp-Session-Id` on requests. Servers that issue a session ID
        return it in the response header of the same name.
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: false
          schema: { type: string }
          description: Optional client-supplied session identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/JSONRPCRequest'
                - $ref: '#/components/schemas/JSONRPCNotification'
                - type: array
                  description: A JSON-RPC batch.
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/JSONRPCRequest'
                      - $ref: '#/components/schemas/JSONRPCNotification'
            examples:
              listTools:
                summary: List available MCP tools
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: tools/list
              callApplyConfig:
                summary: Call the apply_config tool
                value:
                  jsonrpc: "2.0"
                  id: 2
                  method: tools/call
                  params:
                    name: apply_config
                    arguments:
                      agent:
                        image: my-agent:latest
                      fs:
                        - mount: /workspace
                          backend: local
                          acls:
                            - { path: /workspace, access: rw }
      responses:
        '200':
          description: A JSON-RPC response, or an SSE stream when the call carries follow-up messages.
          headers:
            Mcp-Session-Id:
              schema: { type: string }
              description: Echoed when the server is operating in session mode.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/JSONRPCResponse'
                  - type: array
                    items: { $ref: '#/components/schemas/JSONRPCResponse' }
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each `data:` payload is a
                  JSON-RPC `JSONRPCResponse` or `JSONRPCNotification`.
        '202':
          description: A notification was accepted. The body is empty.
        '400':
          description: The request was not a valid JSON-RPC envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JSONRPCResponse' }

    get:
      tags: [MCP]
      summary: Open a server-to-client SSE stream.
      operationId: mcpStream
      description: |
        Opens a Server-Sent Events stream the server can use to push
        notifications and out-of-band responses to the client. Servers
        that do not initiate messages outside of request/response
        return `405 Method Not Allowed`.
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: false
          schema: { type: string }
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                description: Stream of JSON-RPC notifications and responses.
        '405':
          description: This server does not push messages outside of request/response.

    delete:
      tags: [MCP]
      summary: Terminate an MCP session.
      operationId: mcpDelete
      description: |
        Closes the session identified by `Mcp-Session-Id`. The server
        releases all per-session state. Subsequent requests carrying
        the same session id will be rejected with `404 Not Found`.
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: true
          schema: { type: string }
          description: Identifier of the session to close.
      responses:
        '204':
          description: Session closed.
        '400':
          description: The `Mcp-Session-Id` header was missing.
        '404':
          description: No session with that id exists.

components:
  schemas:
    ExecRequest:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command:
          type: string
          description: Command to run, passed to a shell.
          example: python3 script.py
        cwd:
          type: string
          description: Working directory for the command. Defaults to `/`.
          example: /workspace
        env:
          type: object
          additionalProperties:
            type: string
          description: >
            Environment variables for the command as a key/value map. These
            are merged on top of the sandbox config's `env`, overriding any
            entries with the same name. When omitted, the sandbox config's
            environment variables are used as-is.
          example:
            LOG_LEVEL: debug

    ExecStreamRequest:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command:
          type: string
          description: Command to run, passed to a shell.
          example: python3 script.py
        cwd:
          type: string
          description: Working directory for the command. Defaults to `/`.
          example: /workspace
        env:
          type: object
          additionalProperties:
            type: string
          description: >
            Environment variables for the command as a key/value map. These
            are merged on top of the sandbox config's `env`, overriding any
            entries with the same name. When omitted, the sandbox config's
            environment variables are used as-is.
          example:
            LOG_LEVEL: debug
        tty:
          type: boolean
          description: Allocate a pseudo-TTY for the process. Defaults to false.

    ExecStdoutEvent:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [stdout]
        text:
          type: string
          description: Text written to stdout.

    ExecStderrEvent:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [stderr]
        text:
          type: string
          description: Text written to stderr.

    ExecExitEvent:
      type: object
      required: [type, code]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [exit]
        code:
          type: integer
          description: Process exit code.

    JSONRPCRequest:
      type: object
      description: A JSON-RPC 2.0 request envelope.
      required: [jsonrpc, id, method]
      additionalProperties: false
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          description: Client-chosen request identifier echoed back in the response.
          oneOf:
            - { type: string }
            - { type: integer }
        method:
          type: string
          description: |
            MCP method name, e.g. `initialize`, `tools/list`,
            `tools/call`, `resources/list`, `resources/read`,
            `prompts/list`, `prompts/get`.
          example: tools/call
        params:
          description: Method parameters. Schema depends on `method`.
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: array, items: {} }

    JSONRPCNotification:
      type: object
      description: |
        A JSON-RPC 2.0 notification envelope (no `id`, no response
        expected).
      required: [jsonrpc, method]
      additionalProperties: false
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
        params:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: array, items: {} }

    JSONRPCResponse:
      type: object
      description: |
        A JSON-RPC 2.0 response envelope. Exactly one of `result` or
        `error` is present.
      required: [jsonrpc, id]
      additionalProperties: false
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - { type: string }
            - { type: integer }
        result:
          description: |
            Method result. Shape depends on the called method — for
            example, `tools/call` returns a `CallToolResult` with a
            `content` array and `isError` flag.
        error:
          $ref: '#/components/schemas/JSONRPCError'

    JSONRPCError:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          type: integer
          description: |
            Standard JSON-RPC error code. `-32700` parse error,
            `-32600` invalid request, `-32601` method not found,
            `-32602` invalid params, `-32603` internal error.
            Application errors use codes in the range `-32000` to
            `-32099`.
        message:
          type: string
        data:
          description: Optional structured error context.
