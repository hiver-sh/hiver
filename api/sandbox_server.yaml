openapi: 3.0.0
info:
  title: Sandbox API
  version: 0.0.1
  summary: Manage a sandbox's file systems and network egress declaratively.
  description: |
    The Sandbox API exposes a single declarative configuration
    document — `SandboxConfig. Submit the desired
    configuration and the API computes the minimum set of changes
    required to converge the running sandbox to that state.

tags:
  - name: Configuration
    description: Read and apply the sandbox's configuration document.
  - name: Files
    description: Move file contents into the sandbox.
  - name: Proxy
    description: Reach the HTTP service exposed by the sandbox container.
  - name: Execution
    description: Run commands inside the sandbox.

paths:
  /v1:
    get:
      tags: [Configuration]
      summary: List the sandboxes running in this pod.
      operationId: listSandboxes
      description: |
        Returns the sandboxes currently managed by this pod's supervisor.
        Pod-level (not keyed) — used for ops/debug.
      responses:
        '200':
          description: The sandboxes in the pod.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SandboxList' }

  /v1/events:
    get:
      tags: [Configuration]
      summary: Stream lifecycle events for the pod's inner sandboxes.
      operationId: streamPodEvents
      description: |
        Opens a long-lived Server-Sent Events stream of `PodEvent` payloads —
        one per inner-sandbox lifecycle transition (starting, running, stopping,
        stopped). Pod-level (not keyed). The controller holds one of these
        connections open per pod to track its sandboxes' lifecycle and surface
        them on the controller's own event stream.
      responses:
        '200':
          description: |
            SSE stream opened. The server writes one `data:` frame (a
            JSON-encoded `PodEvent`) per transition until the client disconnects
            or the pod shuts down.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE stream; each `data:` payload is a JSON `PodEvent`.

  /v1/{key}:
    parameters:
      - $ref: '#/components/parameters/Key'
    post:
      tags: [Configuration]
      summary: Create (or claim) the sandbox for the given key.
      operationId: createSandbox
      description: |
        Brings up the sandbox addressed by `key`. On a prewarmed pod
        (started with `-prewarm`) this restores the pod's snapshot into a new
        sandbox under `key`; on a non-prewarmed pod the sandbox is already
        running from the boot (env) config, so an existing key returns it.

        The sandbox configuration comes from the pod's environment
        (`HIVE_SPEC`); a request body, if present, is currently advisory and
        only the image is checked against the pod's fixed image.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: './config.yaml#/components/schemas/SandboxConfig' }
      responses:
        '200':
          description: A sandbox already exists for this key; its ref is returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sandbox' }
        '201':
          description: The sandbox was created and is serving.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sandbox' }
        '409':
          description: |
            The config names a different image than the pod's, or the pod has no
            free slot for this key (it already hosts its sandbox).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
    delete:
      tags: [Configuration]
      summary: Tear down the sandbox for the given key.
      operationId: deleteSandbox
      description: Stops the sandbox addressed by `key` and frees its slot.
      responses:
        '204':
          description: The sandbox was torn down.
        '404':
          description: No sandbox exists for this key.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/config:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      tags: [Configuration]
      summary: Read the current configuration.
      operationId: getConfig
      description: Returns the `SandboxConfig` currently in effect.
      responses:
        '200':
          description: The current configuration.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/SandboxConfig' }

    put:
      tags: [Configuration]
      summary: Apply a desired configuration.
      operationId: applyConfig
      description: |
        Compares the supplied desired configuration with the current
        applied state and applies the additions and removals needed
        to converge. Returns the post-apply configuration and a
        `Changes` document describing what was added or removed.

        The call is atomic: if any individual change fails, the entire
        apply is rolled back and `applied` is `false`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './config.yaml#/components/schemas/SandboxConfig' }
            examples:
              addFileSystem:
                summary: Add a Google Drive file system to an existing sandbox
                value:
                  agent:
                    image: my-agent:latest
                  fs:
                    - mount: /workspace
                      backend: local
                      acls:
                        - { path: /workspace, access: rw }
                        - { path: /workspace/**, access: rw }
                    - mount: /drive
                      backend: gdrive
                      gdrive_access_token: ya29.example
                      gdrive_folder_id: 1QWodtGM...
                      acls:
                        - { path: /drive, access: rw }
                        - { path: /drive/**, access: rw }
                  egress:
                    allow:
                      - host: api.github.com
                        methods: [GET]
                        paths: [/repos/*]
      responses:
        '200':
          description: Apply attempted. Inspect `applied` and `changes`.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/ApplyResult' }
        '400':
          description: The supplied configuration is invalid.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '409':
          description: A previous apply is still in progress.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/file:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      tags: [Files]
      summary: Download a file from a sandbox mount.
      operationId: getFile
      description: |
        Stream the contents of a single file living under one of the
        configured `SandboxConfig.fs` mounts. The `path` query
        parameter is the agent-visible absolute path (e.g.
        `/workspace/data.csv`) and must resolve to a regular file
        beneath one of the configured mount roots.

        Like `POST /v1/file`, the read bypasses the destination
        mount's ACLs — the control-plane is higher privilege than
        the workload.
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: |
            Agent-visible absolute path to read. Must be inside one
            of the configured `fs[].mount` directories.
          example: /workspace/data.csv
      responses:
        '200':
          description: The file contents.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: |
                `attachment; filename="<basename>"`, where `<basename>`
                is the last path component of `path`.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: The request is malformed (missing `path`, traversal, …).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: |
            `path` is not under any configured mount, or no regular
            file exists at the resolved location.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

    delete:
      tags: [Files]
      summary: Delete a file or empty directory from a sandbox mount.
      operationId: deleteFile
      description: |
        Removes a single file or empty directory at the given agent-visible
        path. The path must resolve inside one of the configured
        `SandboxConfig.fs` mounts. Non-empty directories are rejected with
        400. Like the other file operations, this bypasses the mount's ACLs.
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: |
            Agent-visible absolute path to delete. Must be inside one of
            the configured `fs[].mount` directories.
          example: /workspace/data.csv
      responses:
        '204':
          description: File or empty directory deleted.
        '400':
          description: The request is malformed or path is a non-empty directory.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: |
            `path` is not under any configured mount, or nothing exists at
            the resolved location.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

    post:
      tags: [Files]
      summary: Upload a file into a sandbox mount.
      operationId: uploadFile
      description: |
        Upload a single file to a configured file system mount. The
        `destination` field must exactly match one of the `mount`
        paths in the active `SandboxConfig.fs`. The file is written
        at `<destination>/<filename>`, where `<filename>` is the
        basename of the uploaded file's `Content-Disposition`
        `filename` parameter.

        The write bypasses the destination mount's ACLs, so the per-path
        rules that govern the agent's own filesystem access do not apply
        here.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [destination, file]
              properties:
                destination:
                  type: string
                  description: |
                    Mount path to write into. Must match a configured
                    `fs[].mount` exactly.
                  example: /workspace
                file:
                  type: string
                  format: binary
                  description: File contents.
            encoding:
              file:
                contentType: application/octet-stream
      responses:
        '200':
          description: File written.
          content:
            application/json:
              schema:
                type: object
                required: [path, bytes]
                additionalProperties: false
                properties:
                  path:
                    type: string
                    description: Absolute path the file was written to.
                    example: /workspace/data.csv
                  bytes:
                    type: integer
                    format: int64
                    description: Number of bytes written.
        '400':
          description: The request is malformed (missing fields, wrong content type, …).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: The `destination` does not match any configured mount.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/directories:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      tags: [Files]
      summary: List the contents of a directory under a sandbox mount.
      operationId: listDirectory
      description: |
        Returns the immediate children of a directory that lives under one
        of the configured `SandboxConfig.fs` mounts. The `path` query
        parameter is the agent-visible absolute path (e.g. `/workspace`)
        and must resolve to a directory beneath one of the configured
        mount roots.

        Like `/v1/file`, the read bypasses the destination mount's ACLs.
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: |
            Agent-visible absolute path of the directory to list. Must be
            inside one of the configured `fs[].mount` directories.
          example: /workspace
      responses:
        '200':
          description: Directory listing.
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                additionalProperties: false
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [name, path, is_dir, size]
                      additionalProperties: false
                      properties:
                        name:
                          type: string
                          description: Basename of the entry.
                          example: data.csv
                        path:
                          type: string
                          description: Agent-visible absolute path of the entry.
                          example: /workspace/data.csv
                        is_dir:
                          type: boolean
                          description: True if the entry is a directory.
                        size:
                          type: integer
                          format: int64
                          description: File size in bytes; 0 for directories.
        '400':
          description: The request is malformed (missing `path`, traversal, …).
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }
        '404':
          description: |
            `path` is not under any configured mount, or no directory
            exists at the resolved location.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/events:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      summary: Open the SSE event stream.
      operationId: getEvents
      description: |
        Opens a long-lived Server-Sent Events stream of `SandboxEvent`
        payloads. The connection stays open for as long as the client
        is willing to read; the server pushes one SSE `data:` frame per
        event in the order events occur.

        ## Resuming after a disconnect

        Pass the `id` of the last event the client successfully
        processed as `lastEventId`. The server will replay every event
        with a greater id and then continue with new events as they
        happen. Omit `lastEventId` to start from the next event the
        sandbox emits — past events are not replayed in that case.

        ## Framing

        Each SSE frame is a single `data:` line whose value is a
        JSON-encoded `SandboxEvent`. The SSE `id:` field mirrors the
        event's `id`, so SSE-aware clients (including browsers, which
        send `Last-Event-ID` automatically on reconnect) can resume
        without inspecting the payload.
      parameters:
        - in: query
          name: lastEventId
          schema:
            type: integer
          description: |
            Resume the stream after this event id. Only events with a
            strictly greater `id` will be sent. Omit to start from the
            next new event.
        - in: query
          name: follow
          schema:
            type: boolean
            default: true
          description: |
            When `false`, the server sends the current backlog of events
            and then closes the connection. When `true` (the default),
            the connection stays open and the server pushes new events
            as they arrive.
      responses:
        '200':
          description: |
            SSE stream opened. The response is open-ended; the server
            keeps writing frames until the client disconnects or the
            sandbox shuts down.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each `data:` payload is a
                  JSON-encoded `SandboxEvent`.

  /v1/{key}/exec:
    parameters:
      - $ref: '#/components/parameters/Key'
    post:
      tags: [Execution]
      summary: Execute a command and return buffered output.
      operationId: exec
      description: |
        Runs a command inside the sandbox and waits for it to finish.
        Returns the complete stdout, stderr, and exit code in a single
        JSON response. Use `/v1/exec-stream` instead when you need
        output incrementally.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecRequest' }
      responses:
        '200':
          description: Command finished. Inspect `exit_code` for success/failure.
          content:
            application/json:
              schema:
                type: object
                required: [stdout, stderr, exit_code]
                additionalProperties: false
                properties:
                  stdout:
                    type: string
                    description: Complete text written to stdout.
                  stderr:
                    type: string
                    description: Complete text written to stderr.
                  exit_code:
                    type: integer
                    description: Process exit code.
        '400':
          description: The request body is malformed.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/exec-stream/{id}:
    parameters:
      - $ref: '#/components/parameters/Key'
    post:
      tags: [Execution]
      summary: Execute a command and stream output as SSE.
      operationId: execStream
      description: |
        Runs a command inside the sandbox and streams its output as a
        Server-Sent Events stream. Each SSE frame carries an `event:`
        field of `stdout`, `stderr`, or `exit`, and a `data:` field
        with the payload.

        `stdout` and `stderr` frames carry the raw text written to the
        respective stream. The `exit` frame is always the last frame;
        its `data:` is a JSON object `{"code": <int>}` with the
        process exit code.

        The stream closes after the `exit` frame is written. Use
        `/v1/exec` instead when you only need the final buffered result.

        When `command` is empty or omitted, the request attaches to the
        sandbox entrypoint's TTY (which must have been started with the
        sandbox's `tty: true` option) rather than running a new command:
        output frames carry the entrypoint terminal's bytes, `stdin`
        writes go to it, and the stream stays open until the client
        disconnects or the entrypoint exits.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Client-set unique identifier for this process.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecStreamRequest' }
      responses:
        '200':
          description: |
            SSE stream opened. Frames arrive in order with `event:` set
            to `stdout`, `stderr`, or `exit`. The stream closes after
            the `exit` frame.
          content:
            text/event-stream:
              schema:
                description: |
                  Server-Sent Events stream. Each `data:` payload is a
                  JSON-encoded `ExecEvent`. The `event:` field matches
                  the `type` discriminator.
                oneOf:
                  - $ref: '#/components/schemas/ExecStdoutEvent'
                  - $ref: '#/components/schemas/ExecStderrEvent'
                  - $ref: '#/components/schemas/ExecExitEvent'
                discriminator:
                  propertyName: type
                  mapping:
                    stdout: '#/components/schemas/ExecStdoutEvent'
                    stderr: '#/components/schemas/ExecStderrEvent'
                    exit:   '#/components/schemas/ExecExitEvent'
        '400':
          description: The request body is malformed.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/exec-stream/{id}/stdin:
    parameters:
      - $ref: '#/components/parameters/Key'
    post:
      tags: [Execution]
      summary: Write to a running process's stdin.
      operationId: execStreamStdin
      description: |
        Sends data to the stdin of a process started with `/v1/exec-stream/{id}`.
        Returns 404 if no process with the given id is running.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The id of the running process.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              additionalProperties: false
              properties:
                data:
                  type: string
                  description: Text to write to the process's stdin.
      responses:
        '204':
          description: Data written to stdin.
        '404':
          description: No running process found with the given id.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/{key}/proxy/{port}/{path}:
    parameters:
      - $ref: '#/components/parameters/Key'
      - name: port
        in: path
        required: true
        schema:
          type: string
        description: |
          Port of the service running inside the sandbox to forward to
          (e.g. `8080`). Maps directly to the port the sandbox process is
          listening on.
      - name: path
        in: path
        required: true
        schema:
          type: string
        description: |
          Path to forward to the inner sandbox's exposed port.
          The proxy strips `/v1/proxy/{port}/` and forwards the remainder.
    get:
      tags: [Proxy]
      summary: Proxy a GET request to the sandbox's exposed port.
      operationId: proxyGet
      responses: &proxy_responses
        '200':
          description: Response from the inner sandbox.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
    head:
      tags: [Proxy]
      summary: Proxy a HEAD request to the sandbox's exposed port.
      operationId: proxyHead
      responses: *proxy_responses
    post:
      tags: [Proxy]
      summary: Proxy a POST request to the sandbox's exposed port.
      operationId: proxyPost
      responses: *proxy_responses
    put:
      tags: [Proxy]
      summary: Proxy a PUT request to the sandbox's exposed port.
      operationId: proxyPut
      responses: *proxy_responses
    patch:
      tags: [Proxy]
      summary: Proxy a PATCH request to the sandbox's exposed port.
      operationId: proxyPatch
      responses: *proxy_responses
    delete:
      tags: [Proxy]
      summary: Proxy a DELETE request to the sandbox's exposed port.
      operationId: proxyDelete
      responses: *proxy_responses

  /v1/{key}/ports:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      tags: [Proxy]
      summary: List the ports exposed by the sandbox.
      operationId: getPorts
      description: |
        Returns the TCP ports currently being listened on inside the
        sandbox workload. Each entry is a port that can be reached
        through `/v1/proxy/{port}/{path}`.
      responses:
        '200':
          description: The exposed ports, ascending. May be empty.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                example: [8080, 9000]

  /v1/{key}/info:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      tags: [Configuration]
      summary: Read internal runtime info about the sandbox.
      operationId: getInfo
      description: |
        Returns internal runtime information about the sandbox that is
        determined at boot rather than configured — currently the
        isolation mechanism actually in use. Isolation is selected
        automatically: a sandbox image that ships a guest root filesystem
        runs as a `microvm`, otherwise as a `container`.
      responses:
        '200':
          description: The sandbox's runtime info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SandboxInfo' }

  /v1/{key}/ping:
    parameters:
      - $ref: '#/components/parameters/Key'
    get:
      tags: [Configuration]
      summary: Send a ping to the sandbox.
      operationId: Ping
      description: |
        Resets the sandbox shutdown timer and reports readiness. Returns 200
        once the inner sandbox is up and running, or 503 while it is still
        starting.
      parameters:
        - in: query
          name: block
          schema:
            type: boolean
            default: false
          description: |
            When `true`, wait for the sandbox to become ready before responding
            rather than returning 503 immediately. The wait is bounded by the
            request; if the connection is closed first the server gives up.
      responses:
        '200':
          description: Ping received; the sandbox is ready.
        '503':
          description: The sandbox is not ready yet.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

components:
  parameters:
    Key:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: |
        The sandbox key addressing a specific sandbox within the pod. Unique
        per pod and caller-chosen (e.g. `agent-1`).
      example: agent-1

  schemas:
    Sandbox:
      type: object
      description: |
        A provisioned sandbox. Returned by the create endpoint so the response
        matches the controller's `POST /v1/sandboxes/{key}` payload: in
        Kubernetes the gateway routes creates straight to the image pod, so the
        client observes this body directly.
      required: [id, key]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: |
            Server-assigned routing identifier: the host pod's IPv4 address
            packed into the leading bytes of a UUID. The gateway decodes it back
            to the pod IP to route keyed requests. In pack mode every sandbox on
            a pod shares this id.
          example: 1e9d6c3a-8f4b-4c2e-9a7d-2b5f0c8e1a34
        key:
          type: string
          pattern: '^[A-Za-z0-9_-]{1,64}$'
          description: The caller-chosen key supplied at creation.
          example: agent-1
        status: { $ref: '#/components/schemas/SandboxStatus' }

    SandboxStatus:
      type: string
      enum: [starting, running, stopping]
      description: |
        Lifecycle phase reported by the hosting pod's supervisor:
        - `starting`: created, workload launching, not yet serving.
        - `running`: workload is up and serving requests.
        - `stopping`: teardown has begun (DELETE, agent exit, or pod shutdown).
      example: running

    SandboxList:
      type: object
      description: The sandboxes managed by a pod's supervisor.
      required: [sandboxes]
      additionalProperties: false
      properties:
        sandboxes:
          type: array
          items: { $ref: '#/components/schemas/SandboxSummary' }

    SandboxSummary:
      type: object
      description: A single sandbox managed by the pod.
      required: [key, ready, status]
      additionalProperties: false
      properties:
        key:
          type: string
          description: The sandbox's key.
          example: agent-1
        ready:
          type: boolean
          description: Whether the sandbox's workload is up and serving.
        status: { $ref: '#/components/schemas/SandboxStatus' }

    PodEvent:
      type: object
      description: A lifecycle transition of one inner sandbox in the pod.
      required: [key, status, timestamp]
      additionalProperties: false
      properties:
        key:
          type: string
          description: The sandbox's key.
          example: agent-1
        status:
          type: string
          enum: [starting, running, stopping, stopped]
          description: |
            The transition: starting (created, launching), running (now
            serving), stopping (teardown begun), stopped (slot freed).
          example: running
        timestamp:
          type: string
          format: date-time
          description: When the transition occurred.

    SandboxInfo:
      type: object
      description: Internal runtime information about the sandbox.
      required: [isolation]
      additionalProperties: false
      properties:
        isolation:
          type: string
          enum: [container, microvm]
          description: >
            The isolation mechanism the sandbox is running with, determined
            automatically at boot from the image: `microvm` when the image
            ships a guest root filesystem, otherwise `container`.
          example: container

    ExecRequest:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >
            Command to run. A string is passed to a shell (`sh -c`); an array
            is executed directly as argv, with each element a literal argument
            (no shell, no word-splitting or expansion).
          example: python3 script.py
        cwd:
          type: string
          description: Working directory for the command. Defaults to `/`.
          example: /workspace
        env:
          type: object
          additionalProperties:
            type: string
          description: >
            Environment variables for the command as a key/value map. These
            are merged on top of the sandbox config's `env`, overriding any
            entries with the same name. When omitted, the sandbox config's
            environment variables are used as-is.
          example:
            LOG_LEVEL: debug

    ExecStreamRequest:
      type: object
      additionalProperties: false
      properties:
        command:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >
            Command to run. A string is passed to a shell (`sh -c`); an array
            is executed directly as argv, with each element a literal argument
            (no shell, no word-splitting or expansion). When empty or omitted,
            the request attaches to the entrypoint's TTY instead of running a
            new command — this requires the sandbox to have been configured
            with `tty: true`, otherwise the request fails.
          example: python3 script.py
        cwd:
          type: string
          description: Working directory for the command. Defaults to `/`.
          example: /workspace
        env:
          type: object
          additionalProperties:
            type: string
          description: >
            Environment variables for the command as a key/value map. These
            are merged on top of the sandbox config's `env`, overriding any
            entries with the same name. When omitted, the sandbox config's
            environment variables are used as-is.
          example:
            LOG_LEVEL: debug
        tty:
          type: boolean
          description: Allocate a pseudo-TTY for the process. Defaults to false.

    ExecStdoutEvent:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [stdout]
        text:
          type: string
          description: Text written to stdout.

    ExecStderrEvent:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [stderr]
        text:
          type: string
          description: Text written to stderr.

    ExecExitEvent:
      type: object
      required: [type, code]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [exit]
        code:
          type: integer
          description: Process exit code.
