openapi: 3.0.0
info:
  title: Sandbox Control Plane API
  version: 0.0.1
  summary: Provision sandboxes on demand.
  description: |
    The control plane is the host-side API that creates sandboxes. Each
    sandbox runs in its own pod and exposes its own per-sandbox API.
    The control plane's only job is to create that pod from a `SandboxConfig`
    and hand the caller back enough information to reach it.

tags:
  - name: Sandboxes
    description: Provision sandboxes.

paths:
  /v1/sandboxes:
    get:
      tags: [Sandboxes]
      summary: List all sandboxes.
      operationId: listSandboxes
      description: Returns all currently provisioned sandboxes.
      responses:
        '200':
          description: The list of sandboxes.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Sandbox' }

  /v1/sandboxes/events:
    get:
      tags: [Sandboxes]
      summary: Stream sandbox lifecycle events.
      operationId: streamSandboxEvents
      description: |
        Server-sent event stream of sandbox lifecycle events. Each event has
        the form `{"id":"<sandbox-id>","status":"start|stop|die|destroy"}`.
        The stream stays open until the client disconnects.
      responses:
        '200':
          description: SSE stream of sandbox lifecycle events.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SandboxLifecycleEvent'

  /v1/sandboxes/{id}:
    put:
      tags: [Sandboxes]
      summary: Get or create a sandbox.
      operationId: getOrCreateSandbox
      description: |
        Idempotent provision. If a sandbox with `id` already exists, it
        is returned unchanged (`200 OK`) and the request body is
        ignored. If not, a new sandbox is created from the supplied
        `SandboxConfig` (`201 Created`) and returned.

        Two callers racing on the same id will both observe the same
        sandbox: whichever request creates it returns `201`, the other
        returns `200` against the now-existing record.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{1,64}$'
          description: Caller-chosen unique identifier.
          example: tenant-acme-build-42
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: './config.yaml#/components/schemas/SandboxConfig' }
            examples:
              minimal:
                summary: Local-only workspace
                value:
                  fs:
                    - mount: /workspace
                      backend: local
                      acls:
                        - { path: /workspace, access: rw }
                        - { path: /workspace/**, access: rw }
      responses:
        '200':
          description: |
            A sandbox with `id` already existed; the existing record is
            returned and the request body was ignored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sandbox' }
        '201':
          description: A new sandbox was created from the supplied config.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sandbox' }
        '400':
          description: The `id` or `SandboxConfig` is malformed.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

  /v1/shutdown/{id}:
    post:
      tags: [Sandboxes]
      summary: Shut down and remove a sandbox.
      operationId: shutdownSandbox
      description: |
        Stops the sandbox container (sending SIGTERM, then SIGKILL after
        the docker default grace period if needed) and removes it. The
        sandbox-side graceful-shutdown cascade — sidecars, agent,
        remote-backend drain — runs as part of the stop, then the
        container is removed. The call blocks until both steps
        complete.

        Idempotent on already-stopped containers: an exited container
        is simply removed. Unknown ids return `404`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{1,64}$'
          description: The sandbox id.
          example: tenant-acme-build-42
      responses:
        '204':
          description: Sandbox stopped and removed.
        '404':
          description: No sandbox with that id exists.
          content:
            application/json:
              schema: { $ref: './config.yaml#/components/schemas/Error' }

components:
  schemas:
    SandboxLifecycleEvent:
      type: object
      description: A sandbox container lifecycle event.
      required: [id, status]
      additionalProperties: false
      properties:
        id:
          type: string
          description: The sandbox id.
          example: tenant-acme-build-42
        status:
          type: string
          enum: [start, stop, die, destroy]
          description: The lifecycle transition.

    Sandbox:
      type: object
      description: A provisioned sandbox.
      required: [id]
      additionalProperties: false
      properties:
        id:
          type: string
          description: The id supplied at creation.
          example: tenant-acme-build-42
