components:
  schemas:
    SandboxEvent:
      description: |
        A typed event emitted by the sandbox. The `type` field selects
        the variant; consumers should switch on it to access
        variant-specific fields.
      oneOf:
        - $ref: '#/components/schemas/ConfigApplyEvent'
        - $ref: '#/components/schemas/EgressRequestEvent'
        - $ref: '#/components/schemas/EgressResponseEvent'
        - $ref: '#/components/schemas/EgressChunkEvent'
        - $ref: '#/components/schemas/FSRequestEvent'
        - $ref: '#/components/schemas/FSResponseEvent'
        - $ref: '#/components/schemas/StdioEvent'
        - $ref: '#/components/schemas/ResourceUsageEvent'
        - $ref: '#/components/schemas/ExecRequestEvent'
        - $ref: '#/components/schemas/ExecResponseEvent'
      discriminator:
        propertyName: type
        mapping:
          config.apply: '#/components/schemas/ConfigApplyEvent'
          egress.request: '#/components/schemas/EgressRequestEvent'
          egress.response: '#/components/schemas/EgressResponseEvent'
          egress.chunk: '#/components/schemas/EgressChunkEvent'
          fs.request: '#/components/schemas/FSRequestEvent'
          fs.response: '#/components/schemas/FSResponseEvent'
          stdio: '#/components/schemas/StdioEvent'
          resource.usage: '#/components/schemas/ResourceUsageEvent'
          exec.request: '#/components/schemas/ExecRequestEvent'
          exec.response: '#/components/schemas/ExecResponseEvent'

    SandboxEventBase:
      type: object
      description: Fields common to every `SandboxEvent` variant.
      required: [type, id, timestamp]
      properties:
        type:
          type: string
          description: Discriminator selecting the event variant.
        id:
          type: integer
          description: |
            Monotonic event id. Pass via the `lastEventId` query
            parameter on `GET /v1/events` to resume after this event.
        timestamp:
          type: string
          format: date-time

    ConfigApplyEvent:
      description: |
        Emitted after an `applyConfig` call. `success` indicates whether
        the change was committed or rolled back; `errorMessage` is set
        when `success` is false.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, success, changes]
          properties:
            type:
              type: string
              const: config.apply
            success:
              type: boolean
            changes:
              $ref: './config.yaml#/components/schemas/Changes'
            errorMessage:
              type: string
              description: Human-readable failure reason. Set when `success` is false.
      example:
        type: config.apply
        id: 184
        timestamp: "2026-05-08T17:04:11Z"
        success: true
        changes:
          fs:
            added:
              - mount: /drive
                backend: gdrive
                acls:
                  - { path: /drive/**, access: rw }
          egress:
            added:
              - host: api.github.com
                methods: [GET]
                paths: [/repos/*]

    EgressRequestEvent:
      description: |
        Emitted when an outbound request from the agent was evaluated
        against egress rules. `access` indicates whether it was allowed
        or denied.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, access, host, method, path]
          properties:
            type:
              type: string
              const: egress.request
            access:
              type: string
              enum: [allowed, denied]
            host:
              type: string
            method:
              type: string
              description: |
                HTTP method (`GET`, `POST`, …) for HTTP egress, or the
                protocol identifier (`TLS`, `CONNECT`) for transparent
                paths where no inner HTTP method is observed.
            path:
              type: string
              description: |
                URL path (no query string). Egress rule matching is
                path-only.
            query:
              type: string
              description: |
                Raw URL query (no leading `?`). Empty when the
                request had no query string, and omitted entirely
                for CONNECT / raw-forward-TLS audits where there is
                no inner HTTP request to parse.
            headers:
              type: object
              additionalProperties:
                type: string
              description: |
                HTTP request headers sent to the upstream after proxy
                transformations (strip + override). Multi-value headers are
                joined with `, ` per RFC 7230 §3.2.2. Omitted for
                CONNECT / raw-forward-TLS flows where no inner HTTP request
                is parsed, and for denied requests.
            body:
              type: string
              description: |
                Request body captured by the proxy during TLS interception.
                Omitted for CONNECT / raw-forward-TLS flows where the body
                is not readable, and for requests with no body.
      example:
        type: egress.request
        id: 186
        timestamp: "2026-05-08T17:06:44Z"
        access: denied
        host: registry.npmjs.org
        method: GET
        path: /search
        query: q=left-pad

    EgressResponseEvent:
      description: |
        Emitted when an allowed outbound request completed. The
        `request_id` matches the `id` of the originating
        `EgressRequestEvent`.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, request_id, status, duration_ms]
          properties:
            type:
              type: string
              const: egress.response
            request_id:
              type: integer
              description: Unique identifier correlating this result to its `EgressRequestEvent`.
            status:
              type: integer
              description: HTTP status code returned by the upstream.
            duration_ms:
              type: integer
              description: Wall-clock duration of the request, in milliseconds.
            headers:
              type: object
              additionalProperties:
                type: string
              description: |
                HTTP response headers returned by the upstream. Multi-value
                headers are joined with `, ` per RFC 7230 §3.2.2. Omitted
                for CONNECT / raw-forward-TLS flows where no inner HTTP
                response is parsed.
      example:
        type: egress.result
        id: 190
        timestamp: "2026-05-08T17:10:02Z"
        request_id: 186
        status: 200
        duration_ms: 87

    EgressChunkEvent:
      description: |
        Emitted for each chunk from a streaming upstream
        response. The `request_id` matches the `id` of the originating
        `EgressRequestEvent`.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, request_id, body]
          properties:
            type:
              type: string
              const: egress.chunk
            request_id:
              type: integer
              description: Unique identifier correlating this chunk to its `EgressRequestEvent`.
            body:
              type: string
              description: |
                Raw chunk content.
            label:
              type: string
              description: |
                Optional tag indicating the chunk's origin. For WebSocket
                traffic the proxy sets `up` (client→upstream) or `down`
                (upstream→client); HTTP/SSE responses omit the field.
      example:
        type: egress.chunk
        id: 191
        timestamp: "2026-05-08T17:10:03Z"
        request_id: 186
        body: "data: {\"token\":\"Hello\"}"
        label: "down"

    FSRequestEvent:
      description: |
        Emitted when an agent file operation was evaluated against ACL
        rules. `access` indicates whether it was allowed or denied.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, access, mount, path, operation]
          properties:
            type:
              type: string
              const: fs.request
            access:
              type: string
              enum: [allowed, denied]
            mount:
              type: string
            path:
              type: string
            operation:
              type: string
              enum: [read, write]
      example:
        type: fs.request
        id: 187
        timestamp: "2026-05-08T17:07:12Z"
        access: denied
        mount: /workspace
        path: /workspace/secret/keys.pem
        operation: read

    FSResponseEvent:
      description: |
        Emitted when the FUSE layer got a response from a
        storage backend (for example, local drive, Google Drive).
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, backend, request_id, duration_ms]
          properties:
            type:
              type: string
              const: fs.response
            backend:
              $ref: './config.yaml#/components/schemas/Backend'
            request_id:
              type: integer
              description: Unique identifier correlating this result to its `FSRequestEvent`.
            duration_ms:
              type: integer
              description: Wall-clock duration of the request, in milliseconds.
            error:
              type: string
              description: Optional error message.
      example:
        type: fs.response
        id: 188
        timestamp: "2026-05-08T17:08:03Z"
        backend: gdrive
        request_id: 187
        method: GET
        url: https://www.googleapis.com/drive/v3/files/1aBcDeFgHiJkLmNoP
        status: 200
        duration_ms: 142

    StdioEvent:
      description: |
        Emitted when the sandboxed process wrote to a standard pipe.
        At least one of `stdout` or `stderr` is set per event.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type]
          properties:
            type:
              type: string
              const: stdio
            stdout:
              type: string
              description: Chunk written to stdout.
            stderr:
              type: string
              description: Chunk written to stderr.
      example:
        type: stdio
        id: 189
        timestamp: "2026-05-08T17:09:21Z"
        stdout: "hello world\n"

    ResourceUsageEvent:
      description: |
        Emitted periodically to report sandbox resource consumption.
        `cpu_percent` is the CPU utilisation over the last sample interval;
        `memory_bytes` is the current resident set size.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, cpu_percent, memory_bytes]
          properties:
            type:
              type: string
              const: resource.usage
            cpu_percent:
              type: number
              format: float
              minimum: 0
              maximum: 100
              description: CPU utilisation as a percentage (0–100) over the last sample interval.
            memory_bytes:
              type: integer
              description: Resident set size of the sandbox process, in bytes.
      example:
        type: resource.usage
        id: 210
        timestamp: "2026-05-28T12:00:00Z"
        cpu_percent: 42.5
        memory_bytes: 134217728

    ExecRequestEvent:
      description: |
        Emitted when a command is dispatched for execution inside the sandbox.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, cwd, command]
          properties:
            type:
              type: string
              const: exec.request
            cwd:
              type: string
              description: Working directory in which the command was invoked.
            command:
              type: string
              description: The command string that was executed.
      example:
        type: exec.request
        id: 220
        timestamp: "2026-05-31T10:15:00Z"
        cwd: /workspace
        command: "npm install"

    ExecResponseEvent:
      description: |
        Emitted when a command execution completes. The `request_id` matches
        the `id` of the originating `ExecRequestEvent`.
      allOf:
        - $ref: '#/components/schemas/SandboxEventBase'
        - type: object
          required: [type, request_id]
          properties:
            type:
              type: string
              const: exec.response
            request_id:
              type: integer
              description: Unique identifier correlating this result to its `ExecRequestEvent`.
      example:
        type: exec.response
        id: 221
        timestamp: "2026-05-31T10:15:04Z"
        request_id: 220
