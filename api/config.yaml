components:
  schemas:
    SandboxConfig:
      type: object
      description: Hive sandbox configuration.
      required: [fs]
      additionalProperties: false
      properties:
        image:
          type: string
          description: >
            Reference to the agent image to launch.
            This cannot be changed after the sandbox is initialized.
          example: my-agent:latest
        env:
          type: object
          additionalProperties:
            type: string
          description: >
            Additional environment variables as a key/value map.
            This cannot be changed after the sandbox is initialized.
          example:
            LOG_LEVEL: info
            REGION: us-east-1
        ttl:
          type: integer
          minimum: 0
          default: 1800
          description: >
            Sandbox time to live in seconds. The client must ping the sandbox using the
            /v1/ping endpoint to reset the timer. Once a ping has not been received for
            as long as this value, the sandbox will receive a SIGTERM and begin shutdown.

            The default is 30 min or 1800 seconds.

            Use `0` to disable shutdown.
          example: 1800
        fs:
          type: array
          minItems: 1
          description: |
            One or more file systems exposed to the agent. Mount paths
            must be unique and non-overlapping (a mount path may not
            be a parent directory of another mount path).
          items: { $ref: '#/components/schemas/FileSystem' }
        egress:
          type: array
          description: |
            Ordered list of egress rules. The first rule that matches a
            request decides the outcome; requests that match no rule
            are denied.
          items: { $ref: '#/components/schemas/EgressRule' }

    FileSystem:
      description: |
        A file system exposed to the agent at `mount`. The `backend`
        selects the storage type and determines which variant applies.
        Access is governed by `acls`, evaluated longest-prefix-first
        with deny as the default.
      oneOf:
        - $ref: '#/components/schemas/LocalFileSystem'
        - $ref: '#/components/schemas/GDriveFileSystem'
        - $ref: '#/components/schemas/GCSFileSystem'

    FileSystemBase:
      type: object
      required: [mount, backend]
      properties:
        mount:
          type: string
          description: Absolute path at which the file system appears to the agent.
          pattern: '^/.+'
          example: /workspace
        backend:
          $ref: '#/components/schemas/Backend'
        acls:
          type: array
          description: Access control rules for paths under `mount`.
          items: { $ref: '#/components/schemas/ACLRule' }

    LocalFileSystem:
      description: Sandbox-local storage with no external dependency.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          properties:
            backend:
              type: string
              enum: [local]
            origin:
              type: string
              description: >
                The local path to mount into this sandbox.
                Local origins are only supported locally with the Docker runtime.
                It's helpful for local development. e.g. mounting local skill files into the sandbox.

    GDriveFileSystem:
      description: A file system backed by Google Drive.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          properties:
            backend:
              type: string
              enum: [gdrive]
            gdrive_access_token:
              type: string
              format: password
              description: OAuth access token.
            gdrive_refresh_token:
              type: string
              format: password
              description: OAuth refresh token.
            gdrive_client_id:
              type: string
              description: OAuth client ID.
            gdrive_client_secret:
              type: string
              format: password
              description: OAuth client secret.
            gdrive_service_account_json:
              type: string
              format: password
              description: |
                Service account credential JSON. Mutually exclusive with
                the OAuth fields above.
            gdrive_folder_id:
              type: string
              description: |
                ID of the Drive folder the file system is scoped to. When
                omitted, the account root is used.

    GCSFileSystem:
      description: A file system backed by Google Cloud Storage.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          required: [gcs_bucket, gcs_service_account_json]
          properties:
            backend:
              type: string
              enum: [gcs]
            gcs_bucket:
              type: string
              description: GCS bucket name.
            gcs_prefix:
              type: string
              description: |
                Optional key prefix within the bucket that the file system
                is scoped to (e.g. `workspace/session-42`). When omitted,
                the bucket root is used.
            gcs_service_account_json:
              type: string
              format: password
              description: |
                Service account credential JSON. When omitted, Application
                Default Credentials are used (GOOGLE_APPLICATION_CREDENTIALS
                env var, gcloud user credentials, or the GCE/GKE metadata
                server).

    Backend:
      type: string
      enum: [local, gdrive, gcs]
      description: |
        Storage type for a file system.
          * `local`  — sandbox-local storage with no external dependency.
          * `gdrive` — backed by Google Drive.
          * `gcs`    — backed by Google Cloud Storage.

    ACLRule:
      type: object
      description: One access control rule.
      required: [path, access]
      additionalProperties: false
      properties:
        path:
          type: string
          description: |
            Path or glob the rule applies to (for example
            `/workspace/secret/**`). Rules are matched
            longest-prefix-first; access is denied by default when
            no rule matches.
          example: /workspace/secret/**
        access:
          type: string
          enum: [rw, ro, deny]
          description: Read-write, read-only, or fully denied.

    EgressRule:
      type: object
      description: One egress rule.
      required: [host, access]
      additionalProperties: false
      properties:
        access:
          type: string
          enum: [allow, deny]
          description: Whether matching requests are allowed or denied.
        host:
          type: string
          description: |
            Exact host (`api.github.com`) or wildcard suffix
            (`*.pypi.org`).
          example: api.github.com
        ports:
          type: array
          items: { type: integer }
          description: |
            Optional ports otherwise no port enforcement is performed.
          example: [443]
        methods:
          type: array
          items: { $ref: '#/components/schemas/HttpMethod' }
          description: HTTP methods allowed by this rule. Empty means any method.
          example: [GET]
        paths:
          type: array
          items: { type: string }
          description: |
            Glob path patterns allowed by this rule. Empty means any
            path.
          example: ["/repos/*"]
        override:
          type: object
          additionalProperties: false
          description: |
            Values the proxy injects into outbound requests that match
            this rule. If the agent already set the same query parameter
            or header, the proxy overwrites it; otherwise the value is
            added. The agent cannot read these values back.
          properties:
            query:
              type: object
              additionalProperties: { type: string }
              description: |
                URL query parameters to add or overwrite on the outbound
                request. Useful for injecting API keys the agent should
                never see (e.g. `apikey=...`).
              example:
                apikey: sk-redacted
            headers:
              type: object
              additionalProperties: { type: string }
              description: |
                HTTP headers to add or overwrite on the outbound
                request. Useful for injecting bearer tokens or tenant
                identifiers.
              example:
                Authorization: Bearer sk-redacted
                X-Sandbox-Tenant: acme

    ApplyResult:
      type: object
      description: The outcome of an apply call.
      required: [applied, config, changes]
      additionalProperties: false
      properties:
        applied:
          type: boolean
          description: |
            `true` if every change was applied successfully. `false`
            if the apply failed and was rolled back; in that case the
            sandbox is unchanged.
        config:
          $ref: '#/components/schemas/SandboxConfig'
          description: |
            The configuration in effect after this call. When `applied`
            is `true` this matches the request, except for any
            non-modifiable fields preserved from the previous state
            (see `changes.warnings`).
        changes:
          $ref: '#/components/schemas/Changes'
        error:
          type: string
          description: Human-readable failure reason. Set only when `applied` is `false`.

    Changes:
      type: object
      description: |
        Concrete additions and removals carried out by the apply. Each
        list contains whole entries (a complete `FileSystem` or
        `EgressRule`) so the caller can audit what was changed without
        re-diffing the request.
      additionalProperties: false
      properties:
        fs:
          type: object
          additionalProperties: false
          properties:
            added:
              type: array
              items: { $ref: '#/components/schemas/FileSystem' }
            removed:
              type: array
              items: { $ref: '#/components/schemas/FileSystem' }
        egress:
          type: object
          additionalProperties: false
          properties:
            added:
              type: array
              items: { $ref: '#/components/schemas/EgressRule' }
            removed:
              type: array
              items: { $ref: '#/components/schemas/EgressRule' }
        warnings:
          type: array
          items: { type: string }
          description: |
            Non-fatal advisories. Example: a non-modifiable field was
            present in the request and was ignored.

    Error:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: string
          description: Human-readable failure reason.
        details:
          type: object
          additionalProperties: true
          description: |
            Optional structured context such as the offending field
            path or a conflict identifier.

    HttpMethod:
      type: string
      enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
