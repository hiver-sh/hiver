components:
  schemas:
    SandboxConfig:
      type: object
      description: Hive sandbox configuration.
      required: [fs]
      additionalProperties: false
      properties:
        image:
          type: string
          description: >
            The Docker image to run.
            This cannot be changed after the sandbox is initialized.
          example: my-agent:latest
        cpu:
          type: integer
          minimum: 1
          default: 1
          description: >
            Number of virtual CPUs allocated to the sandbox. For the microvm
            isolation this is the guest vCPU count; for the container isolation
            it is enforced as a CPU quota.
            This cannot be changed after the sandbox is initialized.
          example: 1
        memory:
          type: integer
          minimum: 128
          default: 512
          description: >
            Memory allocated to the sandbox, in MiB. For the microvm isolation
            this is the guest RAM size; for the container isolation it is
            enforced as a cgroup memory limit.
            This cannot be changed after the sandbox is initialized.
          example: 512
        entrypoint:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >
            Override the entrypoint used when the container is run. Accepts
            either an argv array (each element is a separate argument) or a
            single string, which is split on whitespace into arguments.
            When omitted, the image's default entrypoint is used.
            e.g. ["tail", "-f", "/dev/null"] or "tail -f /dev/null" blocks
            indefinitely with near-zero CPU.
          example: ["tail", "-f", "/dev/null"]
        cwd:
          type: string
          description: >
            Working directory for the entrypoint. When set, the entrypoint
            is launched with this as its current working directory, overriding
            the image's default working directory. When omitted, the image's
            working directory is used.
            This cannot be changed after the sandbox is initialized.
          example: /workspace
        tty:
          type: boolean
          default: false
          description: >
            When true, the entrypoint is launched attached to a pseudo-TTY.
            A client can then attach to that terminal by calling
            `/v1/exec-stream` with an empty (or omitted) `command`. Useful
            for interactive entrypoints (e.g. a REPL or a shell). Only
            supported for the `container` isolation.
            This cannot be changed after the sandbox is initialized.
          example: false
        env:
          type: object
          additionalProperties:
            type: string
          description: >
            Additional environment variables as a key/value map.
            This cannot be changed after the sandbox is initialized.
          example:
            LOG_LEVEL: info
            REGION: us-east-1
        extra_hosts:
          type: array
          items:
            type: string
          description: >
            Additional /etc/hosts entries injected before the sandbox starts,
            in `hostname:ip` form. The special value `host-gateway` resolves
            to the host machine's IP on the container network (equivalent to
            Docker's `--add-host` flag). Cannot be changed after the sandbox
            is initialized.
          example:
            - "upstream-ws:host-gateway"
            - "db.internal:10.0.0.5"
        ttl:
          type: integer
          minimum: 0
          default: 1800
          description: >
            Sandbox time to live in seconds. The client must ping the sandbox using the
            /v1/ping endpoint to reset the timer. Once a ping has not been received for
            as long as this value, the sandbox will receive a SIGTERM and begin shutdown.

            The default is 30 min or 1800 seconds.

            Use `0` to disable shutdown.
          example: 1800
        fs:
          type: array
          minItems: 1
          description: |
            One or more file systems exposed to the agent. Mount paths
            must be unique and non-overlapping (a mount path may not
            be a parent directory of another mount path).
          items: { $ref: '#/components/schemas/FileSystem' }
        egress:
          type: array
          description: |
            Ordered list of egress rules. The first rule that matches a
            request decides the outcome; requests that match no rule
            are denied.
          items: { $ref: '#/components/schemas/EgressRule' }
        snapshot:
          $ref: '#/components/schemas/Snapshot'

    Snapshot:
      type: object
      description: |
        Snapshot configuration. A snapshot is captured automatically before
        the sandbox shuts down and restored before the sandbox starts.
      additionalProperties: false
      properties:
        restore_key:
          type: string
          pattern: '^[A-Za-z0-9_-]{1,64}$'
          description: |
            Key identifying the snapshot to restore when the sandbox starts.
            When omitted, no snapshot is restored on start.
        write_key:
          type: string
          pattern: '^[A-Za-z0-9_-]{1,64}$'
          description: |
            Key under which the snapshot is saved on shutdown. When omitted,
            the `restore_key` is used.
        include:
          type: array
          minItems: 1
          description: |
            Glob patterns specifying which paths to include in the snapshot.
            The directory containing each matched path is snapshotted (e.g.
            `/home/user/*` snapshots `/home/user`).
          items:
            type: string
          example:
            - /home/user/*
            - /workspace/data
        mount:
          type: string
          pattern: '^/.+'
          description: |
            Mount path of a file system (see `fs`) where snapshot tarballs are
            written and read, instead of the sandbox host's local snapshot
            directory. Point this at an `internal` file system backed by remote
            storage (e.g. `gcs` or `external`) to persist and restore snapshots
            through a FUSE drive. When omitted, the host's local snapshot
            directory is used.
          example: /snapshots

    FileSystem:
      description: |
        A file system exposed to the agent at `mount`. The `backend`
        selects the storage type and determines which variant applies.
        Access is governed by `acls`, evaluated longest-prefix-first
        with deny as the default when no rule matches. If `acls` is
        omitted, a default rule granting `rw` access to `<mount>/**`
        is used.
      oneOf:
        - $ref: '#/components/schemas/LocalFileSystem'
        - $ref: '#/components/schemas/GDriveFileSystem'
        - $ref: '#/components/schemas/GCSFileSystem'
        - $ref: '#/components/schemas/ExternalFileSystem'

    FileSystemBase:
      type: object
      required: [mount, backend]
      properties:
        mount:
          type: string
          description: Absolute path at which the file system appears to the agent.
          pattern: '^/.+'
          example: /workspace
        backend:
          $ref: '#/components/schemas/Backend'
        acls:
          type: array
          description: |
            Access control rules for paths under `mount`. When omitted,
            a single default rule `{ path: "<mount>/**", access: "rw" }`
            is applied, granting full read-write access to the entire mount.
          items: { $ref: '#/components/schemas/ACLRule' }
        internal:
          type: boolean
          default: false
          description: |
            When true, the file system is mounted inside the sandbox runtime
            but is not exposed to the agent workload — the agent never sees
            `mount`. Use it for storage the sandbox needs but the agent must
            not access, e.g. a remote-backed snapshot target referenced by
            `snapshot.mount`. Because the agent cannot reach the mount, `acls`
            are ignored for internal file systems.

    LocalFileSystem:
      description: Sandbox-local storage with no external dependency.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          properties:
            backend:
              type: string
              enum: [local]
            origin:
              type: string
              description: >
                The local path to mount into this sandbox.
                Local origins are only supported locally with the Docker runtime.
                It's helpful for local development. e.g. mounting local skill files into the sandbox.

    GDriveFileSystem:
      description: A file system backed by Google Drive.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          properties:
            backend:
              type: string
              enum: [gdrive]
            gdrive_access_token:
              type: string
              format: password
              description: OAuth access token.
            gdrive_refresh_token:
              type: string
              format: password
              description: OAuth refresh token.
            gdrive_client_id:
              type: string
              description: OAuth client ID.
            gdrive_client_secret:
              type: string
              format: password
              description: OAuth client secret.
            gdrive_service_account_json:
              type: string
              format: password
              description: |
                Service account credential JSON. Mutually exclusive with
                the OAuth fields above.
            gdrive_folder_id:
              type: string
              description: |
                ID of the Drive folder the file system is scoped to. When
                omitted, the account root is used.
            gdrive_prefix:
              type: string
              description: |
                Optional subfolder path within `gdrive_folder_id` that the
                file system is scoped to (e.g. `e2e-test/run-42`). The path
                is created if it does not exist. When omitted, the folder
                root is used.

    GCSFileSystem:
      description: A file system backed by Google Cloud Storage.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          required: [gcs_bucket, gcs_service_account_json]
          properties:
            backend:
              type: string
              enum: [gcs]
            gcs_bucket:
              type: string
              description: GCS bucket name.
            gcs_prefix:
              type: string
              description: |
                Optional key prefix within the bucket that the file system
                is scoped to (e.g. `workspace/session-42`). When omitted,
                the bucket root is used.
            gcs_service_account_json:
              type: string
              format: password
              description: |
                Service account credential JSON. When omitted, Application
                Default Credentials are used (GOOGLE_APPLICATION_CREDENTIALS
                env var, gcloud user credentials, or the GCE/GKE metadata
                server).

    ExternalFileSystem:
      description: |
        A file system backed by an external HTTP host. The host
        implements the contract in `external_file_system.yaml`; the
        sandbox turns each agent file operation into one call against
        it. Use this to plug in any storage you can put behind HTTP
        without adding a new backend to the sandbox itself.
      allOf:
        - $ref: '#/components/schemas/FileSystemBase'
        - type: object
          required: [host]
          properties:
            backend:
              type: string
              enum: [external]
            host:
              type: string
              description: |
                Base URL of the host implementing the external file
                system HTTP interface (see `external_file_system.yaml`).
                Store operations are issued relative to this URL — e.g.
                with host `https://fs.internal:8080`, a read becomes
                `GET https://fs.internal:8080/v1/file?path=...`. A
                trailing slash is ignored.
              example: https://fs.internal:8080

    Backend:
      type: string
      enum: [local, gdrive, gcs, external]
      description: |
        Storage type for a file system.
          * `local`    — sandbox-local storage with no external dependency.
          * `gdrive`   — backed by Google Drive.
          * `gcs`      — backed by Google Cloud Storage.
          * `external` — backed by an HTTP host (see `external_file_system.yaml`).

    ACLRule:
      type: object
      description: One access control rule.
      required: [path, access]
      additionalProperties: false
      properties:
        path:
          type: string
          description: |
            Path or glob the rule applies to (for example
            `/workspace/secret/**`). Rules are matched
            longest-prefix-first; access is denied by default when
            no rule matches.
          example: /workspace/secret/**
        access:
          type: string
          enum: [rw, ro, deny]
          description: Read-write, read-only, or fully denied.

    EgressRule:
      type: object
      description: One egress rule.
      required: [host, access]
      additionalProperties: false
      properties:
        access:
          type: string
          enum: [allow, deny]
          description: Whether matching requests are allowed or denied.
        host:
          type: string
          description: |
            Exact host (`api.github.com`) or wildcard suffix
            (`*.pypi.org`).
          example: api.github.com
        ports:
          type: array
          items: { type: integer }
          description: |
            Optional ports otherwise no port enforcement is performed.
          example: [443]
        methods:
          type: array
          items: { $ref: '#/components/schemas/HttpMethod' }
          description: HTTP methods allowed by this rule. Empty means any method.
          example: [GET]
        paths:
          type: array
          items: { type: string }
          description: |
            Glob path patterns allowed by this rule. Empty means any
            path.
          example: ["/repos/*"]
        override:
          type: object
          additionalProperties: false
          description: |
            Values the proxy injects into outbound requests that match
            this rule. If the agent already set the same query parameter
            or header, the proxy overwrites it; otherwise the value is
            added. The agent cannot read these values back.
          properties:
            host:
              type: string
              description: |
                Upstream the proxy dials instead of the matched host, as
                `hostname[:port]` or `ip[:port]`. When the port is omitted,
                the original destination port is kept. Rule matching is
                unaffected — it still uses the rule's `host` — and the
                agent-visible request is unchanged: the Host header and TLS
                SNI still carry the original hostname, so the override
                target can route by virtual host. During TLS interception
                the upstream handshake still verifies the certificate
                against the original hostname. Audit events report the
                substituted dial target in `upstream`.
              example: stub.internal:17080
            prefix_path:
              type: string
              description: |
                Path prefix prepended to the outbound request path. With
                prefix `/mock`, an agent request for `/v1/user` reaches
                the upstream as `/mock/v1/user`. Rule matching and audit
                events use the agent's original path. Applies to inspected
                HTTP requests only; CONNECT and passthrough TLS are opaque
                and unaffected. A trailing slash is ignored (`/mock/` ≡
                `/mock`).
              example: /mock
            query:
              type: object
              additionalProperties: { type: string }
              description: |
                URL query parameters to add or overwrite on the outbound
                request. Useful for injecting API keys the agent should
                never see (e.g. `apikey=...`).
              example:
                apikey: sk-redacted
            headers:
              type: object
              additionalProperties: { type: string }
              description: |
                HTTP headers to add or overwrite on the outbound
                request. Useful for injecting bearer tokens or tenant
                identifiers.
              example:
                Authorization: Bearer sk-redacted
                X-Sandbox-Tenant: acme

    ApplyResult:
      type: object
      description: The outcome of an apply call.
      required: [applied, config, changes]
      additionalProperties: false
      properties:
        applied:
          type: boolean
          description: |
            `true` if every change was applied successfully. `false`
            if the apply failed and was rolled back; in that case the
            sandbox is unchanged.
        config:
          $ref: '#/components/schemas/SandboxConfig'
          description: |
            The configuration in effect after this call. When `applied`
            is `true` this matches the request, except for any
            non-modifiable fields preserved from the previous state
            (see `changes.warnings`).
        changes:
          $ref: '#/components/schemas/Changes'
        error:
          type: string
          description: Human-readable failure reason. Set only when `applied` is `false`.

    Changes:
      type: object
      description: |
        Concrete additions and removals carried out by the apply. Each
        list contains whole entries (a complete `FileSystem` or
        `EgressRule`) so the caller can audit what was changed without
        re-diffing the request.
      additionalProperties: false
      properties:
        fs:
          type: object
          additionalProperties: false
          properties:
            added:
              type: array
              items: { $ref: '#/components/schemas/FileSystem' }
            removed:
              type: array
              items: { $ref: '#/components/schemas/FileSystem' }
        egress:
          type: object
          additionalProperties: false
          properties:
            added:
              type: array
              items: { $ref: '#/components/schemas/EgressRule' }
            removed:
              type: array
              items: { $ref: '#/components/schemas/EgressRule' }
        warnings:
          type: array
          items: { type: string }
          description: |
            Non-fatal advisories. Example: a non-modifiable field was
            present in the request and was ignored.

    Error:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: string
          description: Human-readable failure reason.
        details:
          type: object
          additionalProperties: true
          description: |
            Optional structured context such as the offending field
            path or a conflict identifier.

    HttpMethod:
      type: string
      enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
