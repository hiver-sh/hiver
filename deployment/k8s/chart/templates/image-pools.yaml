{{- /*
Per-image sandbox pools (design §5/§6). One Deployment+Service per entry in
.Values.images, all in the sandbox namespace. The gateway routes creates
carrying `x-hiver-image: <name>` to the matching Service (see gateway.yaml),
which round-robins across the Deployment's prewarm pods. The controller never
creates these pods.
*/ -}}
{{- range .Values.images }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespaces.sandbox }}
  labels:
    app: {{ .name }}
spec:
  replicas: {{ .replicas }}
  # These pack hosts are privileged and sized to ~fill a node, so the cluster
  # can't hold an old + new pod at once. The default RollingUpdate (maxSurge
  # 25% -> 1 for replicas:1) schedules the new pod before terminating the old
  # one, which then sits Pending forever for want of capacity while the old pod
  # never drains. Recreate tears the old pod down first, freeing the node for
  # the replacement. Accepts a brief gap in that image's prewarm pool per roll.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      # On SIGTERM, sandboxd runs a serial graceful shutdown (FS flush →
      # snapshot capture → FUSE oplog drain → http drain → sidecar SIGTERM
      # grace; see cmd/sandboxd/main.go finalizeShutdown). The snapshot
      # capture is unbounded (workspace size / remote backend), so the
      # default 30s grace can SIGKILL the pod mid-upload and lose the
      # snapshot. Size this to the worst-case shutdown budget.
      terminationGracePeriodSeconds: {{ .terminationGracePeriodSeconds | default $.Values.terminationGracePeriodSeconds }}
      containers:
        - name: sandbox
          image: {{ .image }}
          imagePullPolicy: IfNotPresent
          # --pack marks this as a multi-tenant pack host: it parks and serves
          # same-image sandboxes created on demand via POST /v1/{key}. Guest size
          # comes from each sandbox's config (cpu/memory) and is baked into any VM
          # snapshot the client captures. No HIVE_SPEC: the image is bundled in the
          # pod and each sandbox's config arrives over the API.
          args: [
            "--pack",
            "--snapshot-dir", "/snapshots",
            "--max-concurrent-launches", "{{ .maxConcurrentLaunches }}"
          ]
          env:
            # The create response must echo the pod's routing id (its IPv4
            # packed into a UUID), which sandboxd builds from its own pod IP.
            # In Kubernetes creates route straight here, so this body is what
            # the client observes.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if $.Values.proxyPassthroughAll }}
            - name: HIVER_PROXY_PASSTHROUGH_ALL
              value: "1"
            {{- end }}
            {{- if .upstreamPoolScope }}
            # sbxproxy upstream connection-pool scope. "pod" shares warm upstream
            # connections across all sandboxes in the pod, so a fresh sandbox's first
            # request reuses a sibling's already-warm connection (faster first goto) —
            # trading per-VM connection isolation. "vm" (default) keeps per-source
            # isolation. sandboxd passes this to sbxproxy as -upstream-pool-scope.
            - name: HIVER_PROXY_UPSTREAM_POOL_SCOPE
              value: {{ .upstreamPoolScope | quote }}
            {{- end }}
          ports:
            - containerPort: {{ $.Values.sandboxPort }}
          securityContext:
            privileged: true
          resources:
            {{- toYaml .resources | nindent 12 }}
          volumeMounts:
            - name: snapshots
              mountPath: /snapshots
      volumes:
        # The source of truth for VM-state snapshots: each keyed VM's
        # overlay/metadata/snapshot live here (/snapshots/vm-<key>), captured and
        # resumed in place. Node-ephemeral (per-pod), so snapshots don't survive a
        # pod restart and aren't shared across replicas.
        - name: snapshots
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespaces.sandbox }}
  labels:
    app: {{ .name }}
spec:
  selector:
    app: {{ .name }}
  ports:
    - port: {{ $.Values.sandboxPort }}
      targetPort: {{ $.Values.sandboxPort }}
---
{{- end }}
