apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller
  namespace: {{ .Values.namespaces.controlPlane }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controller
  # Sandboxes live in their own namespace, so the runtime needs these rights
  # there — not in the control-plane namespace.
  namespace: {{ .Values.namespaces.sandbox }}
rules:
  # The k8s runtime provisions each sandbox as a single privileged Pod, named by
  # key so Pod creation is the atomic per-key lock — see
  # internal/api/controller/k8s_runtime.go. The spec is delivered inline via the
  # HIVE_SPEC env var, so no per-sandbox ConfigMap is created; the configmaps
  # verbs remain only so Shutdown can clean up legacy anchor ConfigMaps left by
  # older controllers across a rollout.
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller
  namespace: {{ .Values.namespaces.sandbox }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: controller
subjects:
  # The controller Pod's ServiceAccount lives in the control-plane namespace;
  # this binding grants it the Role above in the sandbox namespace.
  - kind: ServiceAccount
    name: controller
    namespace: {{ .Values.namespaces.controlPlane }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: {{ .Values.namespaces.controlPlane }}
  labels:
    app: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      serviceAccountName: controller
      containers:
        - name: controller
          image: {{ .Values.controller.image }}
          args: ["--server-port={{ .Values.controller.port }}"]
          env:
            {{- toYaml .Values.controller.env | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.controller.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.controller.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  # Name must stay "controller": the gateway's envoy config forwards the
  # /controller/ route to the cluster address "controller:9000".
  name: controller
  namespace: {{ .Values.namespaces.controlPlane }}
  labels:
    app: controller
spec:
  type: ClusterIP
  selector:
    app: controller
  ports:
    - name: http
      port: {{ .Values.controller.port }}
      targetPort: {{ .Values.controller.port }}
