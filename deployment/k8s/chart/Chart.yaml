apiVersion: v2
name: hiver
description: |
  Hiver control plane (controller + Envoy gateway) plus the per-service sandbox
  pools. The gateway's per-service Envoy routes/clusters and the
  Deployment+Service are both generated from a single .Values.sandboxServices
  map, so adding a service is one entry. Each service selects its runtime
  isolation (microvm or container) with a per-service isolation field.
type: application
home: https://github.com/hiver-sh/hiver
sources:
  - https://github.com/hiver-sh/hiver
keywords:
  - sandbox
  - ai-agents
  - envoy
  - microvm
maintainers:
  - name: hiver-sh
    url: https://github.com/hiver-sh
# version and appVersion track the CLI/clients — kept in sync by
# scripts/sync-client-version.sh and asserted by the Release workflow. At release
# time the images in values.yaml are re-pinned to this same version
# (deployment/k8s/pin-release-images.sh) so the published chart ships the images
# built under the matching version.
version: 0.1.34
appVersion: "0.1.34"
