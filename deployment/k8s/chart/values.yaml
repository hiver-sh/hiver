# Single source of truth for the Hiver deployment. `helm template` from this
# file reproduces the former k8s/ kustomize output; the per-image workloads and
# the gateway's Envoy routes/clusters are both generated from `images` below.

namespaces:
  # Control plane: controller + gateway. Root but not privileged, so "baseline"
  # PodSecurity fits ("restricted" would reject the root-running images).
  controlPlane: hiver
  # Sandbox pods run privileged: true (internal/api/controller/k8s_runtime.go),
  # so this namespace must allow the "privileged" Pod Security Standard. Kept
  # separate from the control plane to limit privileged execution to sandboxes.
  sandbox: hiver-sandbox

# Port every sandbox pod's sandboxd listens on. Used by the per-image Services
# and by the gateway's per-image STRICT_DNS clusters.
sandboxPort: 8099

terminationGracePeriodSeconds: 120

# Gateway base URL injected into every sandbox pod (as HIVER_GATEWAY_URL) and
# forwarded by sandboxd into the workload, so an agent running inside a sandbox
# can call back to the gateway — e.g. to create nested sandboxes. Defaults to the
# in-cluster gateway Service in the control-plane namespace on its service port
# (see `gateway` below); override if the gateway is reached via a different
# host/port. Leave empty to inject nothing.
gatewayUrl: http://gateway.hiver

# MITM (not passthrough): sbxproxy terminates TLS with a CA-minted cert the guest
# trusts, validates the real upstream cert itself (chain+hostname, against the
# system roots), and re-encrypts. Browser-side cert verification is then cheap —
# the minted cert chains to a locally-installed (private) root, so Chrome skips
# Certificate Transparency, dropping the ~15ms per-host CT cost passthrough pays.
# Set true to disable MITM and raw-splice everything (faster proxy CPU, but the
# browser does full public-cert verification incl. CT on every first connection).
proxyPassthroughAll: false

controller:
  # Pinned by digest — see the mirror.gcr.io stale-tag hazard note on images
  # below. Overridable at deploy time with --set controller.image=...
  image: hiversh/controller@sha256:ea64e0f3d0cb559e39b55d45e82b92983d26ef9ea1b453a0b60b1bf0c60457e9
  port: 9000
  env:
    # Selects the Kubernetes backend in NewControllerHandlers(); anything else
    # falls through to the Docker (docker.sock) runtime.
    - name: HIVE_RUNTIME
      value: "k8s"
    - name: HIVE_NAMESPACE
      value: "hiver-sandbox"
    # Client-side rate limiter for the controller's Kubernetes client. Above the
    # client-go defaults (QPS 5 / Burst 10) so a concurrent claim burst (one pod
    # Update per claim) isn't self-throttled.
    - name: HIVE_CLIENT_QPS
      value: "50"
    - name: HIVE_CLIENT_BURST
      value: "100"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

gateway:
  # Envoy image from docker/gateway. The baked /etc/envoy/envoy.yaml is
  # overridden by the generated gateway-envoy ConfigMap mounted into the pod so
  # sandboxes resolve across namespaces. Pinned by digest.
  image: hiversh/gateway@sha256:3c2d9277acd16672ae083cb295ba4ebb7874e15c116cf5afbede73de51cb3dd2
  # Envoy listener port (container) and the external LoadBalancer service port.
  listenPort: 10000
  servicePort: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

images:
  - name: claude
    image: hiversh/claude:latest-microvm@sha256:4f2c6c810fdd25d5c7a672d158d69e8a7d7fe8181520e562a6085122c9b4d728
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  - name: codex
    image: hiversh/codex:latest-microvm@sha256:305087d20e674996d304b150c3a46eb968adde29e514268dafe967290539e3e3
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  - name: copilot
    image: hiversh/copilot:latest-microvm@sha256:1e068fc9b197418dbf050cc27ae2f42d19f87176fd13e813abb480bd7c58827a
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  - name: openclaw
    image: hiversh/openclaw:latest-microvm@sha256:e3e85d21922b60c9f13b74bf52f33cdcc28e5dbbdf6c8d4fba39808db18ae537
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  - name: antigravity
    image: hiversh/antigravity:latest-microvm@sha256:fc8bd26c78455d09a8d37abf7759c0a5294152b5a98cc0eaac73ccf2942575f5
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  - name: browser
    image: hiversh/browser:latest-microvm@sha256:36d1e7efd9bf76136f7052a4127033cee36b3b7f15e5879e279bc85e6e9a4bd4
    replicas: 1
    maxConcurrentLaunches: 4
    # Share warm upstream connections across all sandboxes in the pod: a freshly
    # created browser sandbox's first goto reuses a sibling's already-warm
    # connection to the host instead of dialing TCP+TLS fresh. Trades per-VM
    # connection isolation for speed (acceptable for the browser pool).
    upstreamPoolScope: pod
    resources:
      # request = guest size (what the scheduler reserves). limit = node
      # allocatable ceiling on an n2-standard-4 (4 vCPU / 16 GiB).
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 13Gi

  - name: python
    image: hiversh/python:3.13-alpine-microvm@sha256:7a3ba6a2fdf3fe37ef7a2b0be0805854497dfc3c365ac038591cc96d0f5e220b
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  - name: node
    image: hiversh/node:alpine-microvm@sha256:992dc3a8370ee78661ff5c3dbac28de7148a4489529d5f49021961dc21c5f598
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi
