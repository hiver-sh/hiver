# Single source of truth for the Hiver deployment. `helm template` from this
# file reproduces the former k8s/ kustomize output; the per-image workloads and
# the gateway's Envoy routes/clusters are both generated from `images` below.

namespaces:
  # Control plane: controller + gateway. Root but not privileged, so "baseline"
  # PodSecurity fits ("restricted" would reject the root-running images).
  controlPlane: hiver
  # Sandbox pods run privileged: true (internal/api/controller/k8s_runtime.go),
  # so this namespace must allow the "privileged" Pod Security Standard. Kept
  # separate from the control plane to limit privileged execution to sandboxes.
  sandbox: hiver-sandbox

# Port every sandbox pod's sandboxd listens on. Used by the per-image Services
# and by the gateway's per-image STRICT_DNS clusters.
sandboxPort: 8099

terminationGracePeriodSeconds: 120

# Gateway base URL injected into every sandbox pod (as HIVER_GATEWAY_URL) and
# forwarded by sandboxd into the workload, so an agent running inside a sandbox
# can call back to the gateway — e.g. to create nested sandboxes. Defaults to the
# in-cluster gateway Service in the control-plane namespace on its service port
# (see `gateway` below); override if the gateway is reached via a different
# host/port. Leave empty to inject nothing.
gatewayUrl: http://gateway.hiver

# MITM (not passthrough): sbxproxy terminates TLS with a CA-minted cert the guest
# trusts, validates the real upstream cert itself (chain+hostname, against the
# system roots), and re-encrypts. Browser-side cert verification is then cheap —
# the minted cert chains to a locally-installed (private) root, so Chrome skips
# Certificate Transparency, dropping the ~15ms per-host CT cost passthrough pays.
# Set true to disable MITM and raw-splice everything (faster proxy CPU, but the
# browser does full public-cert verification incl. CT on every first connection).
proxyPassthroughAll: false

controller:
  # `:latest` on main tracks the newest release; the released chart is repinned
  # to the immutable hiversh/controller:<version> tag by pin-release-images.sh at
  # package time (see the images note below). Override with --set controller.image=...
  image: hiversh/controller:latest
  port: 9000
  env:
    # Selects the Kubernetes backend in NewControllerHandlers(); anything else
    # falls through to the Docker (docker.sock) runtime.
    - name: HIVE_RUNTIME
      value: "k8s"
    - name: HIVE_NAMESPACE
      value: "hiver-sandbox"
    # Client-side rate limiter for the controller's Kubernetes client. Above the
    # client-go defaults (QPS 5 / Burst 10) so a concurrent claim burst (one pod
    # Update per claim) isn't self-throttled.
    - name: HIVE_CLIENT_QPS
      value: "50"
    - name: HIVE_CLIENT_BURST
      value: "100"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

gateway:
  # Envoy image from docker/gateway. The baked /etc/envoy/envoy.yaml is
  # overridden by the generated gateway-envoy ConfigMap mounted into the pod so
  # sandboxes resolve across namespaces. `:latest` on main; repinned to
  # hiversh/gateway:<version> in the released chart.
  image: hiversh/gateway:latest
  # Envoy listener port (container) and the external LoadBalancer service port.
  listenPort: 10000
  servicePort: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# Per-service sandbox pools. On main the refs are mutable `:latest[-microvm]` tags
# so `helm install .` off main tracks the newest release. At package time
# pin-release-images.sh rewrites every ref (control plane + these) to the
# immutable hiversh/<repo>:<version>[-…] tag the release pushed, so an installed
# chart runs exactly those images. Immutable version tags are never re-pushed, so
# they sidestep the GKE mirror.gcr.io stale-tag hazard that a `:latest` deploy on
# GKE can still hit (dev-only; real installs use the pinned chart).
#
# Keyed by service name (a map, not a list) so a consumer can override a single
# field without redeclaring every pool — Helm deep-merges maps but replaces
# lists wholesale. e.g. `--set sandboxServices.claude.replicas=3` bumps only
# claude, leaving the rest at their chart defaults. A consumer can add their own
# service by adding a new key here (deep-merged in, so the built-ins are untouched).
#
# Each service picks its runtime isolation with its own `isolation` field
# (`microvm` | `container`, default `microvm`). The service's `image` is either:
#   - a map keyed by isolation mode ({microvm: <ref>, container: <ref>}), from
#     which `isolation` selects the variant. The two variants of an image are
#     published together by the release workflow (`container` = the plain tag,
#     `microvm` = the `-microvm` tag), or
#   - a plain string, for a single-variant image (`isolation` is then ignored).
sandboxServices:
  claude:
    image:
      microvm: hiversh/claude:latest-microvm
      container: hiversh/claude:latest
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    # hugePages: "2M"
    #   Back guest memory with hugetlbfs instead of 4KiB pages. Cuts the page
    #   faults a resumed VM takes on its first turn (~15.5k -> ~48 here), which
    #   is the dominant cost of a warm resume. Off by default: it needs a
    #   pre-provisioned node hugetlb pool (vm.nr_hugepages) that is not
    #   reclaimable for normal allocations, so it caps concurrent VMs per node,
    #   and firecracker fails the boot when the pool runs out. Enabling it also
    #   requires re-capturing any existing VM snapshot for this pool.
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  codex:
    image:
      microvm: hiversh/codex:latest-microvm
      container: hiversh/codex:latest
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  copilot:
    image:
      microvm: hiversh/copilot:latest-microvm
      container: hiversh/copilot:latest
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  openclaw:
    image:
      microvm: hiversh/openclaw:latest-microvm
      container: hiversh/openclaw:latest
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  antigravity:
    image:
      microvm: hiversh/antigravity:latest-microvm
      container: hiversh/antigravity:latest
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  browser:
    image:
      microvm: hiversh/browser:latest-microvm
      container: hiversh/browser:latest
    isolation: microvm
    replicas: 1
    maxConcurrentLaunches: 4
    # Share warm upstream connections across all sandboxes in the pod: a freshly
    # created browser sandbox's first goto reuses a sibling's already-warm
    # connection to the host instead of dialing TCP+TLS fresh. Trades per-VM
    # connection isolation for speed (acceptable for the browser pool).
    upstreamPoolScope: pod
    resources:
      # request = guest size (what the scheduler reserves). limit = node
      # allocatable ceiling on an n2-standard-4 (4 vCPU / 16 GiB).
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 13Gi

  python:
    image:
      microvm: hiversh/python:3.13-alpine-microvm
      container: hiversh/python:3.13-alpine
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi

  node:
    image:
      microvm: hiversh/node:alpine-microvm
      container: hiversh/node:alpine
    isolation: microvm
    replicas: 0
    maxConcurrentLaunches: 4
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 4Gi
