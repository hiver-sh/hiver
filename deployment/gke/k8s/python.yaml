# Per-image pool for the `python` logical image (design §5/§6) — the default
# image the client routes to when config.image is unset. The gateway routes
# creates carrying `x-hiver-image: python` to this Service, which round-robins
# across the Deployment's prewarm pods. The controller never creates these pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python
  namespace: hiver-sandbox
  labels:
    app: python
spec:
  replicas: 0
  selector:
    matchLabels:
      app: python
  template:
    metadata:
      labels:
        app: python
    spec:
      containers:
        - name: sandbox
          # Pin a fresh versioned tag (or digest) per push — see the note in
          # browser.yaml on the mirror.gcr.io stale-tag hazard.
          image: hiversh/python:3.13-alpine-microvm
          imagePullPolicy: IfNotPresent
          # --pack + --prewarm mark this as a multi-tenant prewarm host.
          # Guest size for the microVM: 1 vCPU / 512 MiB RAM (--instance-cpu /
          # --instance-memory), baked into the base snapshot. No HIVE_SPEC: the
          # image is bundled in the pod and each sandbox's config arrives over
          # the API, so it's redundant.
          args: [
            "--pack",
            "--prewarm",
            "--snapshot-dir", "/snapshots",
            "--max-concurrent-launches", "4",
            "--overlay-cow-dir", "/cow",
            "--instance-cpu", "1",
            "--instance-memory", "512"
          ]
          ports:
            - containerPort: 8099
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: snapshots
              mountPath: /snapshots
            - name: cow
              mountPath: /cow
      volumes:
        - name: snapshots
          emptyDir: {}
        - name: cow
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: python
  namespace: hiver-sandbox
  labels:
    app: python
spec:
  selector:
    app: python
  ports:
    - port: 8099
      targetPort: 8099
