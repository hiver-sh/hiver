apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: warmpools.hiver.sh
spec:
  group: hiver.sh
  scope: Namespaced
  names:
    kind: WarmPool
    listKind: WarmPoolList
    plural: warmpools
    singular: warmpool
    shortNames: [wp]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        # status is a subresource so the controller updates it without racing
        # spec edits (separate write path, own resourceVersion semantics).
        status: {}
      additionalPrinterColumns:
        - { name: Images, type: string, jsonPath: ".spec.images[*].image" }
        - { name: Ready, type: integer, jsonPath: .status.readyReplicas }
        - { name: Claimed, type: integer, jsonPath: .status.claimedReplicas }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  minItems: 1
                  description: >-
                    Independent per-image warm buffers. Each entry keeps its own
                    standby pods, sized by its own readyReplicas/maxReplicas, and a
                    GetOrCreate only claims a warm pod when its requested image
                    matches one of these entries.
                  items:
                    type: object
                    required: [image]
                    # A buffer can never push its image past its own hard ceiling.
                    x-kubernetes-validations:
                      - rule: "self.maxReplicas >= self.readyReplicas"
                        message: maxReplicas must be >= readyReplicas
                    properties:
                      image:
                        type: string
                        description: >-
                          Sandbox image to keep pre-booted. The claim key: a
                          GetOrCreate request only claims a warm pod when its
                          requested image matches this. The image also fixes the
                          isolation, which sandboxd derives from it at boot.
                      readyReplicas:
                        type: integer
                        minimum: 0
                        default: 1
                        description: >-
                          Target number of warm (unclaimed, ready) pods to keep on
                          standby for this image for instant hand-out.
                      maxReplicas:
                        type: integer
                        minimum: 1
                        default: 1
                        description: >-
                          Hard ceiling on total pods (warm + claimed) for this
                          image. Its warm buffer shrinks as claims grow so
                          warm+claimed never exceeds this.
                      cpu:
                        type: number
                        exclusiveMinimum: true
                        minimum: 0
                        description: >-
                          Virtual CPUs each warm pod boots with, as a ceiling
                          (the pod CPU limit). May be fractional (e.g. 0.5); the
                          microvm guest vCPU count is this value rounded up.
                          Frozen at the warm pod's boot — a claim can't resize it
                          — so size the buffer for what claims need. Omit for the
                          runtime default (1).
                      requestCpu:
                        type: number
                        exclusiveMinimum: true
                        minimum: 0
                        description: >-
                          CPU cores reserved at schedule time (the pod CPU
                          request), decoupled from cpu (the limit) so an idle warm
                          buffer reserves less than it can burst to and packs
                          densely onto a node. Omit for the runtime default (0.5).
                      memory:
                        type: integer
                        minimum: 128
                        description: >-
                          Memory in MiB each warm pod boots with (microvm guest
                          RAM). Frozen at the warm pod's boot — a claim can't
                          resize it — so size the buffer for what claims need.
                          Omit for the runtime default (512).
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                  description: Warm pods currently ready to hand out.
                claimedReplicas:
                  type: integer
                  description: Pods from this pool currently claimed (in use).
                observedGeneration:
                  type: integer
                  format: int64
