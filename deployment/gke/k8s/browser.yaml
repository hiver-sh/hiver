apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser
  namespace: hiver-sandbox
  labels:
    app: browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser
  template:
    metadata:
      labels:
        app: browser
    spec:
      containers:
        - name: sandbox
          # Pinned by tag, not the mutable :microvm tag: GKE nodes pull docker.io
          # through the mirror.gcr.io pull-through cache, which is eventually
          # consistent and serves a STALE tag→digest mapping after a re-push to
          # the same tag — so `:microvm` + imagePullPolicy:Always still lands on
          # an old image. Use a fresh versioned tag (or a digest) per push.
          image: hiversh/browser:microvm-latest
          imagePullPolicy: IfNotPresent
          # Guest size for the microVM: 1 vCPU / 1 GiB RAM (--instance-cpu /
          # --instance-memory). firecracker bakes these into the base snapshot, so
          # every resumer inherits them; the sizing comes from here, not the pod
          # resources. No HIVE_SPEC: the image is whatever is bundled in the pod
          # and each sandbox's real config arrives over the API, so it's redundant.
          args: [
            "--pack",
            "--prewarm",
            "--snapshot-dir", "/snapshots",
            "--max-concurrent-launches", "4",
            "--overlay-cow-dir", "/cow",
            "--instance-cpu", "1",
            "--instance-memory", "1024"
          ]
          ports:
            - containerPort: 8099
          securityContext:
            privileged: true
          resources:
            # request = guest size (what the scheduler reserves). The limit is the
            # node's allocatable ceiling on an n2-standard-4 (4 vCPU / 16 GiB).
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 13Gi
          volumeMounts:
            - name: snapshots
              mountPath: /snapshots
            - name: cow
              mountPath: /cow
      volumes:
        - name: snapshots
          emptyDir: {}
        # Per-VM dm-snapshot COW stores (-overlay-cow-dir /cow), RAM-backed
        # (tmpfs): the base overlay is a single shared read-only origin; each
        # resumed VM gets its own sparse exception store here, so guest rootfs
        # writes stay in RAM. tmpfs usage counts against the pod's memory limit.
        - name: cow
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: browser
  namespace: hiver-sandbox
  labels:
    app: browser
spec:
  selector:
    app: browser
  ports:
    - port: 8099
      targetPort: 8099
