# A standalone sandbox Pod for the hiversh/playwright:microvm-20 image.
apiVersion: v1
kind: Pod
metadata:
  name: playwright-microvm
  namespace: hiver-sandbox
  labels:
    hiver.sandbox.key: playwright-microvm-39
spec:
  restartPolicy: Never
  containers:
    - name: sandbox
      # Pinned by digest, not the mutable :microvm-12 tag: GKE nodes pull
      # docker.io through the mirror.gcr.io pull-through cache, which is
      # eventually consistent and serves a STALE tag→digest mapping after a
      # re-push to the same tag — so `:microvm-12` + imagePullPolicy:Always
      # still lands on an old image. A digest is content-addressed, so the
      # mirror serves the exact image. Update this to the new digest after each
      # push (docker buildx imagetools inspect hiversh/playwright:microvm-12).
      image: hiversh/playwright:microvm-39
      imagePullPolicy: IfNotPresent
      args: ["--pack", "--prewarm", "--snapshot-dir", "/snapshots", "--max-concurrent-launches", "4"]
      ports:
        - containerPort: 8099
      env:
        - name: HIVE_SPEC
          # Guest size for the microVM: 1 vCPU / 1 GiB RAM. firecracker bakes the
          # vCPU count into the base snapshot, so every resumer inherits it; the
          # count comes from cpu/memory here, not the pod resources. Sized at 1
          # (down from 2) so a concurrent-resume burst doesn't oversubscribe the
          # node's few cores — at high qps the 2-vCPU guests put ~2N vCPU threads
          # on a 4-core node, and the resume/apply-state phases (CPU-bound in the
          # guest) ballooned under that contention. Takes effect on the next pod
          # deploy, which rebuilds the base snapshot at the new size.
          value: |
            {"image":"hiversh/playwright:microvm-39","cpu":1,"memory":1024}

      securityContext:
        privileged: true
      resources:
        # request = guest size (what the scheduler reserves). The limit is the
        # node's capacity — the max a single pod can use on an n2-standard-4
        # (4 vCPU / 16 GiB). As limits these cap at what's physically available
        # (GKE reserves ~80m CPU and ~2.7 GiB for system daemons), so the pod
        # bursts up to the node's allocatable without needing the exact figure.
        requests:
          cpu: "1"
          memory: 1Gi
        limits:
          cpu: "4"
          memory: 13Gi
      volumeMounts:
        - name: snapshots
          mountPath: /snapshots
  volumes:
    - name: snapshots
      emptyDir: {}
