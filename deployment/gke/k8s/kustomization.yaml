apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No global `namespace:` transformer: resources intentionally span two
# namespaces (hiver for the control plane, hiver-sandbox for sandboxes) and
# each manifest sets its own namespace explicitly.

resources:
  - namespace.yaml
  - controller.yaml
  - gateway.yaml
  - playwright-pod.yaml

# Override the image tag at deploy time, e.g.:
#   kustomize edit set image hiversh/controller=hiversh/controller:v0.1.18
images:
  - name: hiversh/controller
    digest: sha256:cf79e6f54bd1c666095160dc3c8df2c4f00bf19cd23570c91b7cf56ef702549f
  - name: hiversh/gateway
    digest: sha256:8db4a6b5d87b16e396bac3a0db33c14b6f9544919907d890d6f8e1e1c301d0b2
