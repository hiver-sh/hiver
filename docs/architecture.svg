<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
    <marker id="arr-bidi-start" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style><![CDATA[
    rect.box { stroke-width: 1.5; }
    .svc      { fill: #E3EDF7; stroke: #4A6FA5; }
    .storage  { fill: #FCEBD3; stroke: #C0782F; }
    .audit    { fill: #DEF2E0; stroke: #3D8C50; }
    .external { fill: #ECECEC; stroke: #777; }
    .pod      { fill: #FFFBE6; stroke: #C9A227; stroke-dasharray: 7,4; }

    /* `color` drives the marker arrowheads via currentColor; stroke matches it */
    .arrow    { color: #000; stroke: currentColor; stroke-width: 1.5; fill: none; }
    .arrow-d  { color: #666; stroke: currentColor; stroke-width: 1.3; fill: none; stroke-dasharray: 5,3; }

    .sub       { fill: #555;     font-size: 11px; }
    .edge      { fill: #1a1a1a;  font-size: 10.5px; }
    .edge-d    { fill: #555;     font-size: 10.5px; }
    .section   { fill: #555;     font-size: 11px; font-weight: 700; letter-spacing: 0.6px; }
    .title     { fill: #000;     font-size: 18px; font-weight: 700; }
    .pod-label { fill: #7A5C00; }
  ]]></style>

  <!-- white background so arrows and text render on a guaranteed-light surface
       regardless of viewer / page color scheme -->
  <rect x="0" y="0" width="1400" height="880" fill="#ffffff"/>

  <text x="700" y="22" text-anchor="middle" class="title">Agent Sandbox — Architecture</text>

  <!-- ===================== CONTROL PLANE ===================== -->
  <text x="60" y="44" class="section">CONTROL PLANE</text>

  <rect class="box external" x="60"  y="50" width="140" height="40" rx="4"/>
  <text x="130" y="75" text-anchor="middle" font-weight="600">Client</text>

  <rect class="box external" x="220" y="50" width="130" height="40" rx="4"/>
  <text x="285" y="75" text-anchor="middle" font-weight="600">OIDC IdP</text>

  <rect class="box svc" x="60" y="140" width="620" height="40" rx="6"/>
  <text x="370" y="165" text-anchor="middle" font-weight="700">Control-Plane API</text>

  <rect class="box storage" x="60"  y="250" width="140" height="40" rx="6"/>
  <text x="130" y="275" text-anchor="middle" font-weight="700">PostgreSQL</text>

  <rect class="box svc" x="220" y="250" width="170" height="40" rx="6"/>
  <text x="305" y="275" text-anchor="middle" font-weight="700">policysvc</text>

  <rect class="box svc" x="410" y="250" width="170" height="40" rx="6"/>
  <text x="495" y="275" text-anchor="middle" font-weight="700">SPIRE</text>

  <rect class="box svc" x="60" y="360" width="620" height="40" rx="6"/>
  <text x="370" y="385" text-anchor="middle" font-weight="700">Scheduler / Orchestrator</text>

  <rect class="box svc" x="60" y="450" width="620" height="40" rx="6"/>
  <text x="370" y="475" text-anchor="middle" font-weight="700">sandboxd</text>

  <!-- ===================== DATA PLANE ===================== -->
  <text x="60" y="585" class="section">DATA PLANE (per sandbox)</text>

  <!-- shadow pods to indicate one-of-N on this node -->
  <rect class="box pod" x="80" y="615" width="620" height="210" rx="8" fill-opacity="0.35"/>
  <rect class="box pod" x="70" y="605" width="620" height="210" rx="8" fill-opacity="0.6"/>
  <rect class="box pod" x="60" y="595" width="620" height="210" rx="8"/>
  <text x="370" y="617" text-anchor="middle" font-weight="600" class="pod-label">Sandbox pod</text>

  <rect class="box svc" x="80" y="635" width="580" height="40" rx="4"/>
  <text x="370" y="660" text-anchor="middle" font-weight="700">Agent container</text>

  <rect class="box svc" x="80" y="735" width="280" height="50" rx="4"/>
  <text x="220" y="765" text-anchor="middle" font-weight="700">MITM Proxy</text>

  <rect class="box svc" x="380" y="735" width="280" height="50" rx="4"/>
  <text x="520" y="765" text-anchor="middle" font-weight="700">FUSE Daemon</text>

  <!-- agent → MITM / FUSE -->
  <line class="arrow" x1="220" y1="675" x2="220" y2="735" marker-end="url(#arr)"/>
  <text x="226" y="710" class="edge">HTTP(S)</text>
  <line class="arrow" x1="520" y1="675" x2="520" y2="735" marker-end="url(#arr)"/>
  <text x="526" y="710" class="edge">fs syscalls</text>

  <!-- ===================== AUDIT PIPELINE ===================== -->
  <text x="770" y="44" class="section">AUDIT PIPELINE</text>

  <rect class="box audit" x="770" y="50" width="620" height="40" rx="6"/>
  <text x="1080" y="75" text-anchor="middle" font-weight="700">Audit Bus</text>

  <rect class="box svc" x="850" y="130" width="220" height="40" rx="4"/>
  <text x="960" y="155" text-anchor="middle" font-weight="700">persister</text>

  <rect class="box svc" x="1100" y="130" width="220" height="40" rx="4"/>
  <text x="1210" y="155" text-anchor="middle" font-weight="700">replay UI</text>

  <line class="arrow" x1="960"  y1="90" x2="960"  y2="130" marker-end="url(#arr)"/>
  <line class="arrow" x1="1210" y1="90" x2="1210" y2="130" marker-end="url(#arr)"/>

  <!-- ===================== CONTROL-PLANE ARROWS ===================== -->
  <line class="arrow" x1="130" y1="90" x2="130" y2="140" marker-end="url(#arr)"/>
  <text x="135" y="120" class="edge">REST/gRPC</text>

  <line class="arrow" x1="285" y1="90" x2="285" y2="140" marker-end="url(#arr)"/>
  <text x="290" y="120" class="edge">verify</text>

  <line class="arrow" x1="130" y1="180" x2="130" y2="250" marker-end="url(#arr)"/>
  <text x="135" y="217" class="edge">writes/reads</text>

  <line class="arrow" x1="305" y1="180" x2="305" y2="250" marker-end="url(#arr)"/>
  <text x="310" y="217" class="edge">resolve refs</text>

  <line class="arrow" x1="200" y1="270" x2="220" y2="270" marker-end="url(#arr)" marker-start="url(#arr-bidi-start)"/>

  <line class="arrow" x1="130" y1="290" x2="130" y2="360" marker-end="url(#arr)"/>
  <text x="55"  y="327" class="edge" text-anchor="end">reconcile</text>

  <line class="arrow-d" x1="305" y1="290" x2="305" y2="360" marker-end="url(#arr-d)"/>
  <text x="310" y="327" class="edge-d">ResolveBindings</text>

  <line class="arrow" x1="370" y1="400" x2="370" y2="450" marker-end="url(#arr)"/>
  <text x="375" y="427" class="edge">gRPC</text>

  <line class="arrow" x1="370" y1="490" x2="370" y2="595" marker-end="url(#arr)"/>
  <text x="375" y="545" class="edge">spawns via CRI / Docker</text>

  <!-- ===================== ARROWS INTO AUDIT BUS ===================== -->
  <!-- spread across left edge (API, sandboxd) and bottom edge (MITM, FUSE)
       so they don't all converge on the same ~80px-tall left side -->

  <!-- API → Audit Bus (audit.api): enter left edge near top -->
  <path class="arrow" d="M 680 160 L 705 160 L 705 65 L 770 65" marker-end="url(#arr)"/>
  <text x="710" y="125" class="edge">publish (api)</text>

  <!-- sandboxd → Audit Bus (audit.process): enter left edge near bottom -->
  <path class="arrow" d="M 680 470 L 740 470 L 740 80 L 770 80" marker-end="url(#arr)"/>
  <text x="745" y="220" class="edge">publish (process)</text>

  <!-- MITM audit → Audit Bus (audit.network): enter bottom edge at x=830,
       just left of the persister box -->
  <path class="arrow" d="M 250 785 L 250 825 L 830 825 L 830 90" marker-end="url(#arr)"/>
  <text x="400" y="820" class="edge">audit (network)</text>

  <!-- FUSE audit → Audit Bus (audit.filesystem): enter bottom edge at x=1080,
       in the gap between persister and replay UI -->
  <path class="arrow" d="M 450 785 L 450 835 L 1080 835 L 1080 90" marker-end="url(#arr)"/>
  <text x="700" y="830" class="edge">audit (filesystem)</text>

  <!-- ===================== LEGEND ===================== -->
  <g transform="translate(60, 860)">
    <line x1="0"   y1="0" x2="36"  y2="0" class="arrow"   marker-end="url(#arr)"/>
    <text x="44"  y="4" class="sub">request / data flow</text>
    <line x1="200" y1="0" x2="236" y2="0" class="arrow-d" marker-end="url(#arr-d)"/>
    <text x="244" y="4" class="sub">deferred / out-of-band</text>
  </g>
</svg>
