image: .

fs:
  - backend: gdrive
    mount: /workspace
    acls:
      - { path: /workspace,    access: rw }
      - { path: /workspace/**, access: rw }

  - backend: local
    mount: /scratch
    acls:
      - { path: /scratch,    access: rw }
      - { path: /scratch/**, access: rw }

egress:
  allow: []

