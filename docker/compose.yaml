name: hive

services:
  hive-controller:
    build:
      context: ..
      dockerfile: docker/controller.Dockerfile
    ports:
      - "9000:9000"
    # The controller spawns sandbox containers via `docker` CLI calls
    # against the host daemon. Mount the socket read-write so it can
    # create/start/cp into containers in the `hive` project.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  hive-sandbox-runtime:
    image: hive-sandbox-runtime
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/sandbox-runtime.Dockerfile

  hive-mcp-server:
    image: hive-mcp-server
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/mcpserver.Dockerfile

  hive-sandbox-bundle:
    image: hive-sandbox-bundle
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/sandbox-bundle.Dockerfile
