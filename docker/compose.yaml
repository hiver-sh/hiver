name: hiver

services:
  controller:
    image: hiversh/controller:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/controller.Dockerfile
    # HIVE_PACK=1 (e.g. `HIVE_PACK=1 hiver up`) packs N same-image sandboxes into
    # one container running sandboxd --pack, instead of one container per
    # (image,key) — the multi-sandbox-pod placement (design §6, §10).
    environment:
      HIVE_PACK: ${HIVE_PACK:-}
      HIVE_SNAPSHOT_DIR: ${HOME}/.hive/snapshots
    # The controller spawns sandbox containers via `docker` CLI calls
    # against the host daemon. Mount the socket read-write so it can
    # create/start/cp into containers in the `hive` project.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  gateway:
    image: hiversh/gateway:${TAG:-latest}
    build:
      context: gateway
      dockerfile: Dockerfile
    ports:
      - "10000:10000"

  core:
    image: hiversh/core:${TAG:-latest}
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/core.Dockerfile

  bundler:
    image: hiversh/bundler:${TAG:-latest}
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/bundler.Dockerfile

volumes:
  snapshots:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.hive/snapshots
