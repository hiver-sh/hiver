name: hive

services:
  controller:
    image: docker.io/hiveruntime/controller:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/controller.Dockerfile
    ports:
      - "9000:9000"
    # The controller spawns sandbox containers via `docker` CLI calls
    # against the host daemon. Mount the socket read-write so it can
    # create/start/cp into containers in the `hive` project.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  core:
    image: docker.io/hiveruntime/core:${TAG:-latest}
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/core.Dockerfile

  bundler:
    image: docker.io/hiveruntime/bundler:${TAG:-latest}
    profiles: ["build"]
    build:
      context: ..
      dockerfile: docker/bundler.Dockerfile

volumes:
  snapshots:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.hive/snapshots
