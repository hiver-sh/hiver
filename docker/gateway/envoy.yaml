static_resources:
  listeners:
    - name: main
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: gateway
                # Proxy WebSocket upgrades end-to-end. The sandbox ingress exposes
                # arbitrary upstream ports via /sandbox/<id>/.../proxy/<port>,
                # including Chrome's CDP/DevTools endpoint that Playwright's
                # connectOverCDP drives over a WebSocket. Without this Envoy refuses
                # the Upgrade and the CDP handshake fails.
                upgrade_configs:
                  - upgrade_type: websocket
                # A CDP session can sit idle between commands; don't tear the
                # upgraded stream down on the default idle timeout. 0 disables it.
                stream_idle_timeout: 0s
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: |
                        function envoy_on_request(request_handle)
                          local path = request_handle:headers():get(":path")
                          local id = path:match("^/sandbox/([^/?#]+)")
                          if id then
                            request_handle:headers():replace(":authority", "hiver-sandbox-" .. id .. ":8099")
                          end
                        end
                  - name: envoy.filters.http.dynamic_forward_proxy
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                      # Keep this block byte-identical to the dynamic_forward_proxy
                      # cluster's dns_cache_config below — Envoy keys the shared
                      # cache by name and rejects mismatched configs.
                      dns_cache_config:
                        name: dynamic_forward_proxy_cache_config
                        dns_lookup_family: V4_ONLY
                        # Asymmetric TTL. A successful resolve is cached long
                        # (host_ttl) and refreshed lazily (dns_refresh_rate). A
                        # *failure* is retried fast (dns_failure_refresh_rate), so a
                        # sandbox dialed before its DNS record exists re-resolves
                        # within ~1s instead of serving the cached failure for the
                        # full host_ttl.
                        host_ttl: 300s
                        dns_refresh_rate: 60s
                        dns_failure_refresh_rate:
                          base_interval: 1s
                          max_interval: 1s
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: main
                  virtual_hosts:
                    - name: gateway
                      domains: ["*"]
                      routes:
                        # Create leg (design §3, §11). Docker has no per-image
                        # Services, so every create is routed to the controller,
                        # which resolves the logical image (x-hiver-image header /
                        # config.image) via ~/.hiver/config.json and packs into or
                        # boots the right pod. The path is preserved so it lands on
                        # the controller's POST /v1/sandboxes/{key}. Must precede
                        # the /controller/ catch-all and the /sandbox/ execute leg.
                        - match:
                            prefix: "/v1/sandboxes/"
                          route:
                            cluster: controller
                            timeout: 0s
                        - match:
                            prefix: "/controller/"
                          route:
                            cluster: controller
                            prefix_rewrite: "/"
                            timeout: 0s
                        - match:
                            prefix: "/sandbox/"
                          route:
                            cluster: dynamic_forward_proxy
                            regex_rewrite:
                              pattern:
                                regex: "^/sandbox/[^/]+"
                              substitution: ""
                            timeout: 0s
                            # Re-attempt a sandbox that refused the first connection
                            # rather than returning the cached failure; paired with
                            # the short DNS host_ttl above so the retry resolves
                            # fresh instead of reusing a negatively-cached record.
                            retry_policy:
                              retry_on: "connect-failure,refused-stream,reset,unavailable"
                              num_retries: 5
                              retry_back_off:
                                base_interval: 0.5s
                                max_interval: 5s

  clusters:
    - name: controller
      connect_timeout: 30s
      type: STRICT_DNS
      load_assignment:
        cluster_name: controller
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: controller
                      port_value: 9000

    - name: dynamic_forward_proxy
      connect_timeout: 30s
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.dynamic_forward_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
          # Must match the filter's dns_cache_config above (shared by name).
          dns_cache_config:
            name: dynamic_forward_proxy_cache_config
            dns_lookup_family: V4_ONLY
            host_ttl: 300s
            dns_refresh_rate: 60s
            dns_failure_refresh_rate:
              base_interval: 1s
              max_interval: 1s
